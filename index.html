<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

<title>Practice Lab</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>" />

<!-- KaTeX for maths rendering -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>

<style>
  :root{
    --bg:#000000; --card:#ffffff; --card2:#eef0f3; --feature:#e9f1ff;
    --ink:#1c1c1e; --muted:#8a8a8e; --line:#e4e4ea;
    --brand:#007aff; --brand2:#0a84ff;
    --ok:#34c759; --okbg:#e4f8e9; --bad:#ff3b30; --badbg:#ffe9e7;
    --warn:#ff9500; --warnbg:#fff2e0;
    --radius:12px; --radius-ctrl:10px; --shadow:0 8px 24px -14px rgba(0,0,0,.20);
    --maxw:760px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink);
    background:#f2f2f7;
    font-size:15px;line-height:1.45;
    min-height:100vh;-webkit-text-size-adjust:100%;
  }
  .title h1{font-weight:700;letter-spacing:-.4px}
  .card h2{font-weight:700;letter-spacing:-.3px}
  /* iOS-style switches */
  input[type=checkbox].sw{appearance:none;-webkit-appearance:none;width:46px;height:28px;min-width:46px;border-radius:999px;background:#e3e3e8;position:relative;cursor:pointer;transition:.2s;margin:0;border:none}
  input[type=checkbox].sw:checked{background:var(--ok)}
  input[type=checkbox].sw::after{content:"";position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:.2s}
  input[type=checkbox].sw:checked::after{transform:translateX(18px)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:16px 16px 80px;}
  header.app{display:flex;align-items:center;gap:10px;padding:14px 4px 18px;flex-wrap:wrap}
  .logo{width:42px;height:42px;border-radius:var(--radius-ctrl);flex:0 0 auto;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;font-size:23px;box-shadow:var(--shadow)}
  .title h1{font-size:19px;margin:0;letter-spacing:-.3px}
  .title p{margin:2px 0 0;color:var(--muted);font-size:12.5px}
  .spacer{flex:1}
  .iconbtn{border:1px solid var(--line);background:#fff;border-radius:var(--radius-ctrl);width:42px;height:42px;display:grid;place-items:center;cursor:pointer;font-size:18px;color:var(--ink);transition:.15s}
  .iconbtn:hover{border-color:var(--brand);color:var(--brand)}
  .profilechip{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 12px 5px 6px;cursor:pointer;font-weight:600;font-size:13px}
  .profilechip:hover{border-color:var(--brand)}
  .avatar{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
  .card h2{margin:0 0 4px;font-size:16px}
  .card .sub{color:var(--muted);font-size:13px;margin:0 0 16px;line-height:1.45}

  .grid{display:grid;gap:12px}
  @media(min-width:560px){.grid.cols2{grid-template-columns:1fr 1fr}.grid.cols3{grid-template-columns:1fr 1fr 1fr}}

  label.field{display:block;margin-bottom:14px}
  label.field > .lbl{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink)}
  label.field > .lbl .hint{font-weight:400;color:var(--muted);font-size:12px}
  input,select,textarea{width:100%;font:inherit;font-size:15px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:var(--radius-ctrl);padding:11px 13px;outline:none;transition:.15s}
  input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,122,255,.20)}
  textarea{resize:vertical;min-height:70px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:var(--radius-ctrl);padding:11px 16px;font:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:.15s;background:var(--card2);color:var(--ink);border:1px solid var(--line);-webkit-tap-highlight-color:transparent}
  .btn:hover{filter:brightness(.98)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--brand);color:#fff;border:none}
  .btn.ghost{background:#fff}
  .btn.block{width:100%}
  .btn.lg{padding:13px 18px;font-size:15.5px}
  .btn.sm{padding:7px 11px;font-size:13px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.danger{color:var(--bad);border-color:#fecaca;background:#fff}

  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row.end{justify-content:flex-end}
  .row.between{justify-content:space-between;align-items:center}

  .tiles{display:grid;gap:12px;grid-template-columns:1fr 1fr}
  @media(min-width:560px){.tiles{grid-template-columns:repeat(4,1fr)}}
  .tile{background:#fff;border:1px solid var(--line);border-radius:var(--radius-ctrl);padding:16px;text-align:center}
  .tile .n{font-size:22px;font-weight:800;letter-spacing:-.5px}
  .tile .l{font-size:11.5px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}

  .menu{display:grid;gap:12px}
  @media(min-width:560px){.menu{grid-template-columns:1fr 1fr}}
  .menu .item{display:flex;gap:14px;align-items:center;text-align:left;padding:16px;border-radius:var(--radius-ctrl);border:1px solid var(--line);background:#fff;cursor:pointer;transition:.15s}
  .menu .item:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:var(--shadow)}
  .menu .item .emo{font-size:24px;width:44px;height:44px;border-radius:var(--radius-ctrl);display:grid;place-items:center;background:var(--card2);flex:0 0 auto}
  .menu .item .t{font-weight:700}
  .menu .item .d{font-size:12.5px;color:var(--muted);margin-top:2px}

  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;user-select:none}
  .chip[aria-pressed="true"]{background:var(--brand);color:#fff;border-color:var(--brand)}

  .runbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .timer{font-variant-numeric:tabular-nums;font-weight:800;font-size:20px;letter-spacing:.5px}
  .timer.warn{color:var(--bad)}
  .nav-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
  .qchip{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:#fff;font-weight:700;cursor:pointer;font-size:13px;position:relative}
  .qchip.cur{outline:3px solid rgba(0,122,255,.30);border-color:var(--brand)}
  .qchip.answered{background:#e7f0ff;border-color:#b9d7ff;color:var(--brand)}
  .qchip.flagged::after{content:"";position:absolute;top:-3px;right:-3px;width:11px;height:11px;border-radius:50%;background:var(--warn);border:2px solid #fff}

  .qtext{font-size:16.5px;line-height:1.6;margin:6px 0 18px}
  .opts{display:grid;gap:10px}
  .opt{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);border-radius:var(--radius-ctrl);padding:13px 14px;cursor:pointer;background:#fff;transition:.12s;font-size:15px;line-height:1.5}
  .opt:hover{border-color:var(--brand)}
  .opt[aria-pressed="true"]{border-color:var(--brand);background:#e7f0ff}
  .opt .key{flex:0 0 auto;width:26px;height:26px;border-radius:8px;background:var(--card2);display:grid;place-items:center;font-weight:700;font-size:13px}
  .opt[aria-pressed="true"] .key{background:var(--brand);color:#fff}
  .flagrow{display:flex;align-items:center;gap:10px;margin-top:18px;padding-top:14px;border-top:1px dashed var(--line)}

  .scorehero{text-align:center;padding:10px 0 6px}
  .scorehero .pct{font-size:46px;font-weight:800;letter-spacing:-2px;line-height:1;color:var(--brand)}
  .scorehero .frac{color:var(--muted);margin-top:6px}
  .qresult{border:1px solid var(--line);border-radius:var(--radius-ctrl);padding:16px;margin-bottom:12px}
  .qresult.correct{border-color:#bbf7d0;background:#f0fdf4}
  .qresult.wrong{border-color:#fecaca;background:#fef2f2}
  .qresult.review{border-color:#fde68a;background:#fffbeb}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px}
  .badge.ok{background:var(--okbg);color:var(--ok)}
  .badge.bad{background:var(--badbg);color:var(--bad)}
  .badge.warn{background:var(--warnbg);color:var(--warn)}
  .explain{background:#fff;border:1px solid var(--line);border-radius:var(--radius-ctrl);padding:14px 16px;margin-top:12px;font-size:14.5px;line-height:1.6}
  .explain .h{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px}
  .explain p{margin:0 0 10px}
  .explain p:last-child{margin-bottom:0}
  .explain .step{display:flex;gap:10px;align-items:flex-start;margin:0 0 10px}
  .explain .step:last-child{margin-bottom:0}
  .explain .step .n{flex:0 0 auto;width:22px;height:22px;margin-top:1px;border-radius:50%;background:var(--brand);color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
  .explain .step .t{flex:1;min-width:0}
  .explain .bullet{display:flex;gap:10px;align-items:flex-start;margin:0 0 8px}
  .explain .bullet:last-child{margin-bottom:0}
  .explain .bullet .b{flex:0 0 auto;color:var(--brand);font-weight:700;line-height:1.6}
  .explain .bullet .t{flex:1;min-width:0}
  .explain strong{font-weight:700;color:var(--ink)}
  .explain em{font-style:normal;font-weight:600;color:var(--brand)}
  .figure{margin:4px 0 16px;display:flex;justify-content:center;background:#fff;border:1px solid var(--line);border-radius:var(--radius-ctrl);padding:12px}
  .figure svg{max-width:100%;height:auto;display:block}
  .qresult .figure{background:#fff}
  .gbar{height:10px;border-radius:999px;background:var(--card2);overflow:hidden}
  .gbar-fill{height:100%;border-radius:999px;background:var(--ok);transition:width .4s ease}
  .streak{display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--warn)}
  .ans-line{font-size:14px;margin-top:8px}
  .ans-line b{color:#334155}

  .pill{display:inline-block;font-size:11.5px;color:var(--muted);background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:3px 10px;margin:0 6px 6px 0}
  .refitem{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:var(--radius-ctrl);padding:11px 12px;margin-bottom:8px;background:#fff}
  .refitem .meta{flex:1;min-width:0}
  .refitem .nm{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .refitem .dt{font-size:11.5px;color:var(--muted)}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:11px 16px;border-radius:var(--radius-ctrl);box-shadow:var(--shadow);z-index:200;font-size:14px;max-width:90vw;opacity:0;pointer-events:none;transition:.25s}
  .toast.show{opacity:1}
  .loader{display:grid;place-items:center;padding:40px 0;text-align:center}
  .spinner{width:46px;height:46px;border-radius:50%;border:4px solid #e2e8f0;border-top-color:var(--brand);animation:spin 1s linear infinite;margin-bottom:14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .muted{color:var(--muted)}.small{font-size:12.5px}.hidden{display:none!important}
  details summary{cursor:pointer;font-weight:600;font-size:13px;color:var(--brand);margin-bottom:8px}
  .statusdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;background:#cbd5e1}
  .statusdot.on{background:var(--ok)}
  a{color:var(--brand)}
  .empty{text-align:center;color:var(--muted);padding:30px 10px}.empty .big{font-size:40px;margin-bottom:8px}
  .appfoot{text-align:center;color:var(--muted);font-size:12px;padding:28px 0 6px;letter-spacing:.2px}
  .seclabel{font-size:12px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin:20px 6px 8px}
  .seclabel:first-child{margin-top:4px}
  .lockbox{display:flex;align-items:center;gap:12px;background:var(--feature);border:1px solid #cfe2ff;border-radius:var(--radius-ctrl);padding:14px}
  .lockbox .ic{font-size:22px}
  details.adv{border-top:1px solid var(--line);margin-top:6px;padding-top:12px}
  details.adv > summary{list-style:none}
  details.adv > summary::-webkit-details-marker{display:none}
  details.adv > summary::before{content:"▸ ";color:var(--muted)}
  details.adv[open] > summary::before{content:"▾ "}
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="logo">🧪</div>
    <div class="title"><h1>Practice Lab</h1><p id="subtitle">Real exam-style practice that learns with you</p></div>
    <div class="spacer"></div>
    <button class="profilechip" id="profileChip" title="Switch student"><span class="avatar" id="profileAvatar">?</span><span id="profileName">Student</span><span id="profileCaret" style="color:#94a3b8">▾</span></button>
    <button class="iconbtn" id="navHome" title="Home">🏠</button>
    <button class="iconbtn" id="navSettings" title="Settings">⚙️</button>
  </header>
  <main id="app"></main>
  <footer class="appfoot">© <span id="footYear">2026</span> Cheez · <span id="footVer">v8</span></footer>
</div>
<div class="toast" id="toast"></div>

<script>
/* ============================================================ Practice Lab ============================================================ */
const $=(s,el=document)=>el.querySelector(s);
const $$=(s,el=document)=>[...el.querySelectorAll(s)];
const el=(t,a={},...kids)=>{const n=document.createElement(t);for(const k in a){if(k==='class')n.className=a[k];else if(k==='html')n.innerHTML=a[k];else if(k.startsWith('on'))n.addEventListener(k.slice(2),a[k]);else n.setAttribute(k,a[k]);}for(const c of kids.flat()){if(c==null||c===false)continue;n.append(c.nodeType?c:document.createTextNode(c));}return n;};
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(msg,ms=2800){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),ms);}
function uid(){return 'id'+Math.random().toString(36).slice(2,10)+Date.now().toString(36);}
function fmtTime(sec){sec=Math.max(0,Math.round(sec));const m=Math.floor(sec/60),s=sec%60;return `${m}:${String(s).padStart(2,'0')}`;}
function todayISO(){return new Date().toISOString().slice(0,10);}
/* Turn an AI explanation (plain text + $LaTeX$ + **bold** + numbered steps) into
   readable HTML blocks. Math spans are protected from formatting and re-escaped
   so KaTeX (run by renderMath after insertion) still renders them. */
function fmtExplain(text){
  let raw=String(text??'').replace(/\r/g,'').trim();
  if(!raw)return '';
  const math=[];
  raw=raw.replace(/\$\$[\s\S]*?\$\$|\$[^$\n]*?\$/g,m=>{math.push(m);return `${math.length-1}`;});
  // put each numbered step / "Step N" onto its own line
  raw=raw.replace(/[ \t]+(?=\d+\.\s+(?:\*\*|[A-Z]))/g,'\n');
  raw=raw.replace(/[ \t]+(?=(?:Step|Part)\s+\d+\s*[:.\)])/gi,'\n');
  raw=raw.replace(/[ \t]+(?=\*\s+[A-Za-z($])/g,'\n'); // "* " bullets onto their own line
  const restore=h=>h.replace(/(\d+)/g,(_,i)=>esc(math[i]));
  const inline=t=>restore(esc(t).replace(/\*\*([^*]+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*\n]+?)\*/g,'<em>$1</em>'));
  return raw.split(/\n+/).map(s=>s.trim()).filter(Boolean).map(line=>{
    const step=line.match(/^(\d+)\.\s+([\s\S]*)$/);
    if(step)return `<div class="step"><span class="n">${step[1]}</span><span class="t">${inline(step[2])}</span></div>`;
    const bull=line.match(/^\*\s+([\s\S]*)$/);
    if(bull)return `<div class="bullet"><span class="b">•</span><span class="t">${inline(bull[1])}</span></div>`;
    return `<p>${inline(line)}</p>`;
  }).join('');
}
/* Allow an optional AI-supplied SVG diagram on a question. Keep only a single
   <svg>…</svg>, and strip scripts, external refs and event handlers. Content
   comes from the user's own AI key, but this is cheap defense-in-depth. */
function sanitizeSvg(s){
  s=String(s||'').trim();
  const a=s.search(/<svg[\s>]/i);if(a<0)return '';
  const b=s.toLowerCase().lastIndexOf('</svg>');if(b<0||b<a)return '';
  s=s.slice(a,b+6);
  if(s.length>20000)return '';
  s=s.replace(/<\s*(script|foreignObject|iframe|image|use|a)\b[\s\S]*?<\s*\/\s*\1\s*>/gi,'');
  s=s.replace(/<\s*(script|foreignObject|iframe|image|use)\b[^>]*\/?>/gi,'');
  s=s.replace(/\son[a-z]+\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi,'');
  s=s.replace(/(?:xlink:href|href)\s*=\s*("[^"]*"|'[^']*')/gi,'');
  return /<svg[\s>]/i.test(s)?s:'';
}
function renderMath(scope){if(window.renderMathInElement){try{renderMathInElement(scope||document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],throwOnError:false});}catch(e){}}}
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('load '+src));document.head.append(s);});}
function colorFor(str){let h=0;for(const c of String(str||'x'))h=(h*31+c.charCodeAt(0))%360;return `hsl(${h} 65% 55%)`;}
function initials(name){return (String(name||'?').trim().split(/\s+/).map(w=>w[0]).slice(0,2).join('')||'?').toUpperCase();}

/* ============================================================
   🔒 LOGIN — edit this block to set who can access the app.
   ------------------------------------------------------------
   1) Open the app, press F12 → Console, and run:   await plHash('the-password')
   2) Copy the long hex string it prints.
   3) Add a line below: {name:'Mia', hash:'PASTE_HEX_HERE'}
   The name is matched to a student profile (created if it doesn't exist),
   so each child logs in with their own password and lands on their own profile.
   Mark yourself with parent:true. Leave `users` empty to disable the login.
   NOTE: this is a client-side gate suitable for keeping the public out of a
   family app. The page source is public on GitHub Pages, so it is a deterrent,
   not bank-grade security — but no real secret (your API key) is ever stored in
   the file; keys live only in each device's browser. For stronger protection put
   the site behind Cloudflare Access (free) — see SETUP.md.
   ============================================================ */
const AUTH={
  enabled:true,
  users:[
    {name:'Chi', hash:'98f2292c7e40bcc6ce5f5f8f41996975f2418fd5589e6a37955012a97fb2f3d5', parent:true},
    {name:'Howard', hash:'6a2a6d0bd93e2d3a8af7ea8556f6066bd7c1cc0ad54ad3431cf98237ed1e5e3e'},
    {name:'Brendan', hash:'acd6792c7f8b80c504c404dcb15c85380ae878adb55b04bf2f2603e3caf5fe6c'},
  ]
};
async function plHash(pw){const b=await crypto.subtle.digest('SHA-256',new TextEncoder().encode('practicelab::'+pw));return [...new Uint8Array(b)].map(x=>x.toString(16).padStart(2,'0')).join('');}
window.plHash=plHash;
const AUTH_KEY='practicelab.authed';
function gateActive(){return AUTH.enabled&&AUTH.users.some(u=>u.hash);}
function authedUser(){try{const s=JSON.parse(localStorage.getItem(AUTH_KEY)||'null');if(s&&AUTH.users.find(u=>u.name===s.name))return s;}catch(e){}return null;}
function signOut(){localStorage.removeItem(AUTH_KEY);location.reload();}

/* ============================================================
   🔑 SHARED API KEY (encrypted) — set this from the app, don't hand-edit.
   ------------------------------------------------------------
   The parent sets the AI key once in ⚙️ Settings → "AI key for everyone";
   the app encrypts it under each family member's password and outputs the block

async function bankTake(s,count){

  const topics=(s.topics||[]).map(t=>String(t).toLowerCase());

  pool.sort((a,b)=>((a.servedCount||0)-(b.servedCount||0))||((a.lastServedAt||0)-(b.lastServedAt||0))||(a.createdAt-b.createdAt));
  const chosen=pool.slice(0,count);
  for(const b of chosen){b.servedCount=(b.servedCount||0)+1;b.lastServedAt=Date.now();await dbPut('bank',b);}

// Uses UTC throughout to stay consistent with todayISO() (which stores attempt dates in UTC).
function computeStreak(dates){
  const set=new Set(dates);if(!set.size)return 0;
  let cur=new Date(todayISO()+'T00:00:00Z');
  if(!set.has(dayISO(cur))){cur.setUTCDate(cur.getUTCDate()-1);if(!set.has(dayISO(cur)))return 0;}

}

    :s.style==='short'?'All questions are short-answer (numeric or short text); do NOT provide options.'

DIFFICULTY: ${s.difficulty} (1=gentle warm-up … 5=competition-hard)
FORMAT: ${styleLine}`;
  if(s.context&&s.context.trim())p+=`\n\nADDITIONAL CONTEXT FROM PARENT (follow closely):\n${s.context.trim()}`;
  if(refsText&&refsText.trim())p+=`\n\nREAL PAST-PAPER REFERENCE MATERIAL — closely match the style, wording, format, topic coverage and difficulty of these genuine questions. Do NOT copy them verbatim; create fresh equivalents:\n"""\n${refsText.slice(0,12000)}\n"""`;
  else if(s.webSearch)p+=`\n\nUse your knowledge of real ${exam.label} ${s.subject} papers for ${s.country} ${s.level} to match authentic style, topics and difficulty as closely as possible.`;

REQUIREMENTS:

- Use LaTeX for ALL maths, wrapped in single dollar signs, e.g. $\\frac{3}{4}$ or $x^2+5$.
- EXPLANATIONS — keep them SIMPLE, SHORT and easy for a ${s.level} student to read. Match the vocabulary and sentence length to that age: for primary / elementary years use very simple words and very short sentences. Aim for 2–4 short steps; for primary levels keep the whole explanation under ~60 words. Friendly and encouraging.
- Write the FINAL, already-correct explanation only. Do NOT think out loud, second-guess, recheck, or show false starts (never "wait", "let me recheck", "I made a mistake", "actually", "this is not correct", "let's re-think"). Work out the answer privately, then write only the clean, confident solution.
- Structure each explanation as numbered steps: put each step on its OWN line beginning with "1. ", "2. ", etc., separated by a real newline (\n). Bold the key idea of a step with **double asterisks**. One short sentence per step where possible. Do NOT use asterisk bullets or markdown emphasis in the "question" text itself.

- numeric/short: give "answer" (exact) plus "acceptedAnswers" (equivalent correct forms, e.g. ["0.5","1/2"]).
- "marks": whole number; harder questions worth more.
- DIAGRAMS (optional but encouraged where a picture truly helps — geometry, shapes, fractions, bar models, number lines, clocks, simple data/charts): add an "svg" field containing a clean, self-contained inline SVG diagram. Use a viewBox (e.g. "0 0 300 200"), readable labels, clear strokes and light fills, NO <script>, NO external images/links, NO width/height in px (let it scale). Keep it simple and uncluttered, suitable for a child. Omit "svg" entirely when a diagram adds nothing.

Return ONLY valid JSON, no markdown fences, exactly:
{"questions":[{"topic":"string","type":"multiple_choice|numeric|short","question":"plain question with $LaTeX$ for maths","svg":"optional <svg viewBox=...>...</svg>","options":["a","b","c","d"],"answerIndex":0,"answer":"string","acceptedAnswers":["string"],"explanation":"short, simple, numbered steps","marks":1}]}`;
  return p;
}

async function callGemini(prompt,files){
  const model=CFG.model||'gemini-2.0-flash';
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(CFG.apiKey)}`;
  const parts=[{text:prompt}];
  for(const f of (files||[]))parts.push({inline_data:{mime_type:f.mime,data:f.dataB64}});
  // Strict JSON mode (escapes LaTeX backslashes correctly). For 2.5 "thinking"
  // models, disable thinking AND give a large output budget — otherwise hidden
  // thinking eats the budget and the JSON answer gets truncated.
  const gc={temperature:0.8,responseMimeType:'application/json',maxOutputTokens:16384};
  if(/2\.5|thinking|gemini-flash|gemini-pro/i.test(model))gc.thinkingConfig={thinkingBudget:0,includeThoughts:false};
  const body=JSON.stringify({contents:[{parts}],generationConfig:gc});
  let r,attempt=0;
  while(true){
    r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body});
    if(r.ok)break;
    // Retry only transient server errors (busy). Do NOT retry 429 — that's a
    // quota limit, and retrying just burns more of it.
    if((r.status===503||r.status===500)&&attempt<3){attempt++;await new Promise(res=>setTimeout(res,1500*attempt));continue;}
    const t=(await r.text()).slice(0,400);
    let msg=t;
    if(r.status===503)msg='the model is busy right now — please try again in a moment.';
    else if(r.status===429)msg='daily free-tier limit reached for this model/key. Try again later, switch model, or enable billing (see SETUP.md).';
    throw new Error('Gemini '+r.status+': '+msg);
  }
  const j=await r.json();
  const cand=j?.candidates?.[0];
  const text=(cand?.content?.parts||[]).filter(p=>!p.thought).map(p=>p.text).filter(Boolean).join('');
  if(!text){const reason=cand?.finishReason||j?.promptFeedback?.blockReason||'empty response';throw new Error('Gemini returned no text (finishReason: '+reason+'). Try fewer questions or model gemini-2.0-flash.');}
  return text;
}

// Extract the balanced {...}/[...] starting at index i (respects strings/escapes).
function extractBalanced(s,i){
  const open=s[i],close=open==='{'?'}':']';let d=0,inStr=false,esc=false;
  for(let k=i;k<s.length;k++){const ch=s[k];
    if(inStr){if(esc)esc=false;else if(ch==='\\')esc=true;else if(ch==='"')inStr=false;}
    else{if(ch==='"')inStr=true;else if(ch===open)d++;else if(ch===close){d--;if(d===0)return s.slice(i,k+1);}}}
  return null;
}

function qOpts(q){return Array.isArray(q.options)?q.options:(Array.isArray(q.choices)?q.choices:(Array.isArray(q.answers)?q.answers:null));}

// whitespace alone.
function sanitizeCtrl(s){let out='',inStr=false,esc=false;for(let i=0;i<s.length;i++){const ch=s[i];
  if(inStr){if(esc){out+=ch;esc=false;continue;}if(ch==='\\'){out+=ch;esc=true;continue;}if(ch==='"'){out+=ch;inStr=false;continue;}
    if(ch==='\n'){out+='\\n';continue;}if(ch==='\r'){out+='\\r';continue;}if(ch==='\t'){out+='\\t';continue;}out+=ch;}
  else{out+=ch;if(ch==='"')inStr=true;}}return out;}
// Recover complete question objects from a truncated array (response cut off
// before the closing brackets), then rebuild a valid wrapper.
function salvageQuestions(s){
  const m=s.match(/"(?:questions|items|data)"\s*:\s*\[/);
  let start=m?(m.index+m[0].length-1):s.indexOf('[');if(start<0)return null;
  const objs=[];let i=start+1;

}
function parseQuestions(raw){
  let txt=String(raw||'').trim().replace(/^```(json)?/i,'').replace(/```$/,'').trim();
  const tryParse=s=>{try{return JSON.parse(s);}catch(e){return undefined;}};
  const fixEsc=s=>s.replace(/\\(?!["\\/bfnrtu])/g,'\\\\'); // repair raw LaTeX backslashes
  const usable=p=>{const a=getArr(p);return !!(a&&a.length&&a.some(looksQ));};
  const variants=s=>[s,sanitizeCtrl(s),fixEsc(s),fixEsc(sanitizeCtrl(s))];
  const pick=cs=>{for(const c of cs)for(const v of variants(c)){const p=tryParse(v);if(usable(p))return p;}return undefined;};
  // Candidates: whole text + every balanced {…}/[…] start (ignores thinking/prose
  // & decoy arrays). Each tried with control-char + escape repairs.
  const candidates=[txt];
  for(let i=0;i<txt.length;i++){const ch=txt[i];if(ch==='{'||ch==='['){const sub=extractBalanced(txt,i);if(sub)candidates.push(sub);}}
  let obj=pick(candidates);
  // Last resort: salvage complete questions from a truncated response.
  if(obj===undefined){const sv=salvageQuestions(sanitizeCtrl(txt))||salvageQuestions(txt);if(sv)obj=tryParse(sv)||tryParse(fixEsc(sv));}
  if(obj===undefined)throw new Error('AI did not return valid JSON. The model sent: '+JSON.stringify(txt.slice(0,220)));
  const arr=(getArr(obj)||[]).filter(looksQ);
  if(!arr.length)throw new Error('The AI response had no usable questions. It sent: '+JSON.stringify(txt.slice(0,220)));
  return arr.map((q,i)=>{const opts=qOpts(q);const ai=(typeof q.answerIndex==='number')?q.answerIndex:(typeof q.correctIndex==='number'?q.correctIndex:null);
    return {id:'q'+i,topic:q.topic||q.category||q.strand||'General',
      type:(q.type||(opts&&opts.length?'multiple_choice':'short')),
      question:qText(q),options:opts,answerIndex:ai,
      answer:(q.answer!=null)?String(q.answer):(opts&&typeof ai==='number'?String(opts[ai]):''),
      acceptedAnswers:Array.isArray(q.acceptedAnswers)?q.acceptedAnswers.map(String):(Array.isArray(q.accepted)?q.accepted.map(String):[]),
      explanation:q.explanation||q.solution||q.working||q.reason||'',marks:Number(q.marks||q.mark||q.points)||1,
      svg:sanitizeSvg(q.svg||q.figure||q.diagram||q.image||'')};});
}
async function generateQuestions(s,files){
  const refsText=(files||[]).map(f=>f.text?`[${f.name}]\n${f.text}`:'').filter(Boolean).join('\n\n');
  const prompt=buildPrompt(s,refsText);
  let raw;
  if(CFG.provider==='gemini')raw=await callGemini(prompt,files);
  else if(CFG.provider==='claude')raw=await callClaude(prompt,files);
  else raw=await callOpenAICompatible(prompt,files);
  return parseQuestions(raw);
}
/* Build a practice set with the fewest possible API calls:
   1) serve matching questions straight from the bank (0 calls);
   2) on a miss, generate a BANK_PREFILL-sized batch, use what's needed now and
      bank the surplus for next time.
   Attached past papers or per-session notes always force a fresh generation
   (and are NOT banked, since they're specific to that request). */
async function buildPracticeSet(s,files){
  const count=s.count||10;
  const wantsFresh=(files&&files.length>0)||!!(s.notes&&s.notes.trim());
  let fromBank=[];
  if(!wantsFresh)fromBank=await bankTake(s,count);
  if(fromBank.length>=count)return {questions:reindex(fromBank.slice(0,count)),source:'bank',apiCalls:0};
  const need=count-fromBank.length;
  const batch=wantsFresh?count:Math.max(BANK_PREFILL,need);
  const gen=await generateQuestions({...s,count:batch},files);
  usageBump(1);
  const sessionGen=gen.slice(0,need);
  if(!wantsFresh)await bankAdd(s,gen.slice(need)); // bank only the unused surplus (avoids immediate repeats)
  return {questions:reindex(fromBank.concat(sessionGen)),source:fromBank.length?'mixed':(wantsFresh?'fresh':'generated'),apiCalls:1};
}

/* ============================================================ Marking ============================================================ */
function normNum(s){if(s==null)return null;const m=String(s).replace(/[, $%]/g,'').match(/-?\d+(\.\d+)?/);return m?parseFloat(m[0]):null;}
function normTxt(s){return String(s??'').toLowerCase().replace(/\s+/g,' ').replace(/[. ]+$/,'').trim();}
function gradeAnswer(q,userAns){
  if(userAns==null||userAns===''||userAns===-1)return {status:'wrong',auto:true,blank:true};
  if(q.type==='multiple_choice')return {status:(Number(userAns)===Number(q.answerIndex))?'correct':'wrong',auto:true};
  const candidates=[q.answer,...(q.acceptedAnswers||[])].filter(x=>x!=null&&x!=='');
  const ua=String(userAns);
  if(candidates.some(c=>normTxt(c)===normTxt(ua)))return {status:'correct',auto:true};
  const un=normNum(ua);
  if(un!=null&&candidates.some(c=>{const cn=normNum(c);return cn!=null&&Math.abs(cn-un)<1e-6;}))return {status:'correct',auto:true};
  if(q.type==='short')return {status:'review',auto:false};
  return {status:'wrong',auto:true};
}

function abToB64(ab){let bin='';const bytes=new Uint8Array(ab);const chunk=0x8000;for(let i=0;i<bytes.length;i+=chunk)bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk));return btoa(bin);}
async function ensurePdfJs(){if(window.pdfjsLib)return;await loadScript('https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js');pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';}
async function extractPdfText(ab){await ensurePdfJs();const pdf=await pdfjsLib.getDocument({data:ab.slice(0)}).promise;let t='';for(let p=1;p<=Math.min(pdf.numPages,30);p++){const page=await pdf.getPage(p);const c=await page.getTextContent();t+=c.items.map(i=>i.str).join(' ')+'\n';}return t.trim();}
async function ingestFile(file,tags){
  const ab=await file.arrayBuffer();
  const mime=file.type||(file.name.endsWith('.pdf')?'application/pdf':file.name.match(/\.(txt|md|csv)$/)?'text/plain':'application/octet-stream');
  let text='';
  try{
    if(mime==='application/pdf')text=await extractPdfText(ab);
    else if(mime.startsWith('text/')||/\.(txt|md|csv)$/i.test(file.name))text=new TextDecoder().decode(ab);
  }catch(e){console.warn('extract',e);}
  return {id:uid(),profileId:tags.scope==='all'?'all':pid(),name:file.name,mime,size:file.size,dataB64:abToB64(ab),text:text.slice(0,16000),tags,addedAt:Date.now()};
}

function plainMath(s){return String(s||'').replace(/\$\$?/g,'').replace(/\\frac\{([^{}]*)\}\{([^{}]*)\}/g,'($1)/($2)').replace(/\\times/g,'×').replace(/\\div/g,'÷').replace(/\\cdot/g,'·').replace(/\\(le|leq)/g,'≤').replace(/\\(ge|geq)/g,'≥').replace(/\\(degree|circ)/g,'°').replace(/\\sqrt\{([^{}]*)\}/g,'√($1)').replace(/\\[a-zA-Z]+/g,'').replace(/[{}]/g,'').replace(/\s+/g,' ').trim();}
/* Read-aloud (Web Speech) — strips LaTeX and markdown so it sounds natural. */
function speak(text){const sy=window.speechSynthesis;if(!sy)return toast('Read-aloud isn’t supported on this device.');try{sy.cancel();const u=new SpeechSynthesisUtterance(plainMath(String(text||'')).replace(/\*+/g,''));u.rate=.95;u.lang='en-NZ';sy.speak(u);}catch(e){toast('Couldn’t start read-aloud.');}}
function qSpeakText(q){let t=q.question||'';if(q.type==='multiple_choice'&&q.options)t+='. The options are: '+q.options.map((o,i)=>String.fromCharCode(65+i)+', '+o).join('. ');return t;}
function ansStrings(r){
  const your=r.type==='multiple_choice'?(r.userAns==null||r.userAns===-1?'(left blank)':String.fromCharCode(65+r.userAns)+'. '+plainMath(r.options?.[r.userAns]||'')):(r.userAns?plainMath(String(r.userAns)):'(left blank)');
  const corr=r.type==='multiple_choice'?(String.fromCharCode(65+r.answerIndex)+'. '+plainMath(r.options?.[r.answerIndex]||r.answer)):plainMath(r.answer);
  return {your,corr};
}
function buildSummary(a){
  const lines=[`Student: ${a.student}`,`Practice: ${a.examLabel||''} — ${a.subject||''} — ${a.level||''}`,`Date: ${a.date}   Time taken: ${fmtTime(a.elapsed)}`,'',`SCORE: ${a.percent}%  (${a.gotMarks}/${a.totalMarks} marks)`,`Correct: ${a.correct}/${a.count}   Wrong: ${a.wrong}   To self-check: ${a.needsReview}   Flagged unsure: ${a.flagged}`];
  const ts={};a.results.forEach(r=>{ts[r.topic]=ts[r.topic]||{n:0,c:0};ts[r.topic].n++;if(r.status==='correct')ts[r.topic].c++;});
  const weak=Object.entries(ts).filter(([t,s])=>s.c<s.n).map(([t,s])=>`  • ${t}: ${s.c}/${s.n}`);
  if(weak.length){lines.push('','Topics to revisit:',...weak);}
  const toReview=(a.results||[]).map((r,i)=>({r,i})).filter(x=>x.r.status==='wrong'||x.r.status==='review'||x.r.flagged);
  if(toReview.length){
    lines.push('','───────────────','QUESTIONS TO GO OVER:');
    toReview.forEach(({r,i})=>{const {your,corr}=ansStrings(r);const tag=[r.flagged?'🚩 flagged':'',r.status==='review'?'self-check':''].filter(Boolean).join(', ');
      lines.push('',`Q${i+1} · ${r.topic}${tag?' · '+tag:''}`,`  Question: ${plainMath(r.question)}`,`  Your answer: ${your}`,`  Correct answer: ${corr}`,`  Why: ${plainMath(r.explanation).slice(0,320)}`);});
  }
  lines.push('','— Sent automatically by Practice Lab');
  const text=lines.join('\n');
  const reviewHtml=toReview.length?`<h3 style="margin:20px 0 8px;font-family:Georgia,serif;font-weight:500">Questions to go over (${toReview.length})</h3>`+toReview.map(({r,i})=>{const {your,corr}=ansStrings(r);const tag=[r.flagged?'🚩 flagged':'',r.status==='review'?'self-check':''].filter(Boolean).join(' · ');return `<div style="border:1px solid #e7e1d5;border-radius:10px;padding:12px 14px;margin-bottom:10px;background:#fff"><div style="font-size:12px;color:#6c6a64;margin-bottom:5px">Q${i+1} · ${esc(r.topic)}${tag?' · '+esc(tag):''}</div><div style="font-weight:600;margin-bottom:7px;color:#141413">${esc(plainMath(r.question))}</div><div style="font-size:13px;margin-bottom:2px"><b>Your answer:</b> <span style="color:#c2410c">${esc(your)}</span></div><div style="font-size:13px;margin-bottom:6px"><b>Correct answer:</b> <span style="color:#15803d">${esc(corr)}</span></div><div style="font-size:13px;color:#3d3d3a;background:#faf9f5;border-radius:8px;padding:8px 10px"><b>Why:</b> ${esc(plainMath(r.explanation).slice(0,500))}</div></div>`;}).join(''):'';
  const html=`<div style="font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;max-width:600px;margin:auto;color:#3d3d3a"><h2 style="margin:0 0 4px;font-family:Georgia,serif;font-weight:500;color:#141413">🧪 Practice summary — ${esc(a.student)}</h2><p style="color:#6c6a64;margin:0 0 14px">${esc(a.examLabel||'')} — ${esc(a.subject||'')} — ${esc(a.level||'')} · ${a.date}</p><div style="font-size:34px;font-weight:800;color:#cc785c">${a.percent}%</div><p style="margin:2px 0 14px;color:#3d3d3a">${a.gotMarks}/${a.totalMarks} marks · ${a.correct}/${a.count} correct · ${fmtTime(a.elapsed)} taken</p><table style="border-collapse:collapse;font-size:14px"><tr><td style="padding:3px 14px 3px 0">✅ Correct</td><td><b>${a.correct}</b></td></tr><tr><td style="padding:3px 14px 3px 0">❌ Wrong</td><td><b>${a.wrong}</b></td></tr><tr><td style="padding:3px 14px 3px 0">📝 To self-check</td><td><b>${a.needsReview}</b></td></tr><tr><td style="padding:3px 14px 3px 0">🚩 Flagged unsure</td><td><b>${a.flagged}</b></td></tr></table>${weak.length?`<h3 style="margin:16px 0 4px;font-family:Georgia,serif;font-weight:500">Topics to revisit</h3><ul style="margin:0;color:#3d3d3a">${weak.map(w=>'<li>'+esc(w.trim().replace(/^•\s*/,''))+'</li>').join('')}</ul>`:''}${reviewHtml}<p style="color:#a8a29e;font-size:12px;margin-top:18px">Sent automatically by Practice Lab</p></div>`;
  return {text,html};
}

function scheduleDriveSync(){if(!driveReady())return;clearTimeout(syncTimer);syncTimer=setTimeout(()=>{if(driveToken)driveSyncNow();else driveConnect(false);},1500);}
async function driveFindFile(){const r=await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D'practice-lab.json'&fields=files(id,name)",{headers:{Authorization:'Bearer '+driveToken}});if(!r.ok)throw new Error('drive list '+r.status);return (await r.json()).files?.[0]?.id||null;}
async function driveSyncNow(){if(!driveToken)return;try{const fileId=await driveFindFile();if(fileId){const rr=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media',{headers:{Authorization:'Bearer '+driveToken}});if(rr.ok)await mergeRemote(await rr.json());}const merged={attempts:await dbAll('attempts'),review:await dbAll('review'),refs:await dbAll('refs'),bank:await dbAll('bank'),profiles:CFG.profiles,savedAt:new Date().toISOString()};const meta={name:'practice-lab.json',mimeType:'application/json'};if(!fileId)meta.parents=['appDataFolder'];const b='pl'+Math.random().toString(36).slice(2);const body=`--${b}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(merged)}\r\n--${b}--`;const wr=await fetch('https://www.googleapis.com/upload/drive/v3/files'+(fileId?'/'+fileId:'')+'?uploadType=multipart',{method:fileId?'PATCH':'POST',headers:{Authorization:'Bearer '+driveToken,'Content-Type':'multipart/related; boundary='+b},body});if(!wr.ok)throw new Error('drive save '+wr.status);}catch(e){console.warn('drive sync',e);}}
async function mergeRemote(remote){
  if(Array.isArray(remote.profiles))for(const rp of remote.profiles){
    const lp=CFG.profiles.find(x=>x.id===rp.id||x.name.toLowerCase()===String(rp.name).toLowerCase());
    if(!lp){CFG.profiles.push(rp);}
    else if(rp.defaults&&(rp.defaultsAt||0)>(lp.defaultsAt||0)){lp.defaults=rp.defaults;lp.defaultsAt=rp.defaultsAt;} // newer defaults win
  }
  saveCfg();
  const la=new Map((await dbAll('attempts')).map(a=>[a.id,a]));for(const a of(remote.attempts||[]))if(!la.has(a.id))await dbPut('attempts',a);
  const lr=new Map((await dbAll('review')).map(r=>[r.id,r]));for(const r of(remote.review||[]))if(!lr.has(r.id))await dbPut('review',r);
  const lf=new Map((await dbAll('refs')).map(r=>[r.id,r]));for(const r of(remote.refs||[]))if(!lf.has(r.id))await dbPut('refs',r);
  const lb=new Map((await dbAll('bank')).map(b=>[b.id,b]));for(const b of(remote.bank||[]))if(!lb.has(b.id))await dbPut('bank',b);
  await reconcileProfiles();
}

const _origSubmit=submitSession;
submitSession=async function(){const wasReview=S&&S.mode==='review';const qs=wasReview?S.questions.slice():null;const ans=wasReview?S.answers.slice():null;await _origSubmit.apply(this,arguments);if(wasReview){for(let i=0;i<qs.length;i++){const q=qs[i];if(!q.reviewId)continue;const g=gradeAnswer(q,ans[i]);try{const item=(await dbAll('review')).find(r=>r.id===q.reviewId);if(!item)continue;item.timesSeen=(item.timesSeen||0)+1;if(g.status==='correct'){item.timesCorrect=(item.timesCorrect||0)+1;if(item.timesCorrect>=2)item.mastered=true;}else item.timesCorrect=0;await dbPut('review',item);}catch(e){}}scheduleDriveSync();}};

/* ----- LOGIN ----- */
function isParentName(name){return AUTH.users.some(u=>u.parent&&u.name.toLowerCase()===String(name).toLowerCase());}
function studentNames(){return AUTH.users.filter(u=>!u.parent&&u.hash).map(u=>u.name);}
// Pre-filled practice defaults per student (applied only when a profile has none;
// the parent can still edit & save to override). Keyed by lowercased name.
const SEED_DEFAULTS={
  brendan:{country:'New Zealand',subject:'Mathematics',exam:'icas',level:'Year 5 (Paper C)',topics:[],count:10,difficulty:3,style:'multiple_choice',timeLimitMin:15,webSearch:true,
    context:`Audience: a New Zealand Year 5 student sitting ICAS Mathematics (Paper C). Match authentic ICAS style: short, self-contained, word-based problem-solving questions that test understanding and reasoning rather than rote calculation. Each multiple-choice question has four options (A–D) with exactly one correct answer and plausible distractors based on common mistakes. Progress from easier to harder. Cover a balanced mix: number and place value, fractions and decimals, patterns and simple algebra, measurement (length, mass, capacity, time, money in NZ dollars), geometry and shape, and data and chance. Use New Zealand English spelling and everyday NZ contexts (dollars and cents, kilometres, NZ names and places). Assume no calculator. Keep language age-appropriate for a 9–10 year old, but make the harder questions genuinely require multi-step reasoning.`},
  howard:{country:'New Zealand',subject:'Mathematics',exam:'rangitoto',level:'Year 9 Extension',topics:[],count:10,difficulty:4,style:'mixed',timeLimitMin:20,webSearch:true,
    context:`Audience: a high-achieving New Zealand Year 8 student preparing for a Year 9 high-school extension/accelerate entrance exam, in the style of the Rangitoto College Year 9 Extension Programme (or comparable NZ secondary-school extension entrance assessments where that style applies). Generate original questions matching the difficulty, topics and structure of such entrance exams: challenging, multi-step problem-solving that rewards insight, pattern-spotting and clear reasoning, pitched above standard Year 8 level. Cover number and proportional reasoning (fractions, ratios, percentages, rates), pre-algebra and patterns (forming and solving simple equations, sequences), geometry and measurement (area, perimeter, volume, angles), basic probability and statistics, and logic/word problems. Favour questions that combine two or more ideas and require working, not single-step recall. Follow the New Zealand Curriculum, use New Zealand English and NZ contexts. Assume no calculator unless a question clearly needs one.`}
};
// Stable, name-derived profile id so every device agrees (lets Drive sync merge
// profiles/defaults/history reliably instead of using random per-device ids).
function stableId(name){return 'u:'+String(name).toLowerCase().trim();}
// Students = the non-parent login users. Seed/migrate to stable ids; drop stray
// profiles (parent-named or legacy) that have no saved practices. Idempotent.
async function reconcileProfiles(){
  if(!gateActive())return;
  const names=studentNames();if(!names.length)return;
  let attempts=[],review=[],refs=[];
  try{attempts=await dbAll('attempts');review=await dbAll('review');refs=await dbAll('refs');}catch(e){}
  for(const nm of names){
    const sid=stableId(nm);
    const existing=CFG.profiles.find(p=>p.id===sid||p.name.toLowerCase()===nm.toLowerCase());
    if(existing&&existing.id!==sid){ // migrate data references from old id → stable id
      const oldId=existing.id;
      for(const a of attempts)if(a.profileId===oldId){a.profileId=sid;await dbPut('attempts',a);}
      for(const r of review)if(r.profileId===oldId){r.profileId=sid;await dbPut('review',r);}
      for(const f of refs)if(f.profileId===oldId){f.profileId=sid;await dbPut('refs',f);}
      existing.id=sid;
    } else if(!existing){CFG.profiles.push({id:sid,name:nm});}
  }
  const seen=new Set();CFG.profiles=CFG.profiles.filter(p=>{if(seen.has(p.id))return false;seen.add(p.id);return true;});
  const hasData=id=>attempts.some(a=>a.profileId===id);
  const isStudent=p=>names.some(n=>stableId(n)===p.id);
  CFG.profiles=CFG.profiles.filter(p=>isStudent(p)||hasData(p.id));
  // pre-fill suggested defaults for known students that don't have any yet
  for(const p of CFG.profiles){const sd=SEED_DEFAULTS[p.name.toLowerCase()];if(sd&&!p.defaults){p.defaults={...sd};p.defaultsAt=1;}}
  const au=authedUser(); // a student is locked to their own profile
  if(au&&!au.parent)CFG.activeProfileId=stableId(au.name);
  if(!CFG.profiles.find(p=>p.id===CFG.activeProfileId))CFG.activeProfileId=(CFG.profiles[0]||{}).id;
  saveCfg();
}
function applyAuthedProfile(name){
  if(isParentName(name)){ // parent isn't a student — land on a student profile
    const students=CFG.profiles.filter(p=>!isParentName(p.name));
    if(students.length&&!students.find(p=>p.id===CFG.activeProfileId))CFG.activeProfileId=students[0].id;
    saveCfg();return;
  }
  const sid=gateActive()?stableId(name):null;
  const p=CFG.profiles.find(x=>(sid&&x.id===sid)||x.name.toLowerCase()===String(name).toLowerCase());
  if(p){if(sid)p.id=sid;CFG.activeProfileId=p.id;}else{const np={id:sid||uid(),name};CFG.profiles.push(np);CFG.activeProfileId=np.id;}
  saveCfg();
}
function viewLogin(){
  $('header.app').style.display='none';
  const pwd=el('input',{type:'password',placeholder:'Password',autocomplete:'current-password',onkeydown:e=>{if(e.key==='Enter')tryLogin();}});
  const errEl=el('div',{class:'small',style:'color:var(--bad);min-height:18px;margin-top:6px'});
  async function tryLogin(){const h=await plHash(pwd.value);const u=AUTH.users.find(x=>x.hash&&x.hash===h);if(!u){errEl.textContent='Incorrect password. Try again.';pwd.value='';pwd.focus();return;}localStorage.setItem(AUTH_KEY,JSON.stringify({name:u.name,parent:!!u.parent,ts:Date.now()}));applyAuthedProfile(u.name);await unlockSharedKey(u.name,pwd.value);toast('Welcome, '+u.name+'!');await startApp();}
  show(el('div',{style:'max-width:380px;margin:8vh auto 0'},
    el('div',{class:'card',style:'text-align:center'},
      el('div',{class:'logo',style:'margin:0 auto 14px'},'🧪'),
      el('h2',{style:'font-size:22px'},'Practice Lab'),
      el('p',{class:'sub'},'Enter your password to continue.'),
      pwd,errEl,
      el('button',{class:'btn primary block lg',style:'margin-top:12px',onclick:tryLogin},'Sign in')
    )));
  setTimeout(()=>pwd.focus(),60);
}
async function startApp(){
  $('header.app').style.display='';
  applyVaultMeta();
  await reconcileProfiles();
  initEmailJS();refreshHeaderProfile();
  if(CFG.drive.enabled&&driveClientId()&&location.protocol==='https:'){const t=()=>{if(window.google&&google.accounts&&google.accounts.oauth2)driveConnect(false);else setTimeout(t,500);};setTimeout(t,800);}
  viewHome();
}
const APP_VERSION='v9';
(async function boot(){
  try{$('#footYear').textContent=new Date().getFullYear();$('#footVer').textContent=APP_VERSION;}catch(e){}
  try{await openDB();}catch(e){console.warn('IndexedDB unavailable',e);}
  if(gateActive()&&!authedUser()){viewLogin();return;}
  await startApp();
})();
