<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<meta http-equiv="Expires" content="0" />
<title>Practice Lab</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧪</text></svg>" />

<!-- Inter webfont: one consistent font across the whole app, incl. numbers/maths.
     Falls back to the system font offline / on a local file:// open. -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<!-- KaTeX for maths rendering -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css" crossorigin="anonymous" />
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<!-- GSAP for tasteful UI animation -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<!-- EmailJS (optional) -->
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<!-- Google Identity Services (optional, for Drive sync) -->
<script src="https://accounts.google.com/gsi/client" async defer></script>

<style>
  :root{
    --bg:#000000; --card:#ffffff; --card2:#eef0f3; --feature:#e9f1ff;
    --ink:#1c1c1e; --muted:#8a8a8e; --line:#e4e4ea;
    --brand:#007aff; --brand2:#0a84ff;
    --ok:#34c759; --okbg:#e4f8e9; --bad:#ff3b30; --badbg:#ffe9e7;
    --warn:#ff9500; --warnbg:#fff2e0;
    --radius:12px; --radius-ctrl:10px; --shadow:0 8px 24px -14px rgba(0,0,0,.20);
    --maxw:760px;
    /* One font for the whole app; system font is the offline / file:// fallback. */
    --font:'Inter',-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    font-family:var(--font);
    color:var(--ink);
    background:#f2f2f7;
    font-size:15px;line-height:1.45;
    min-height:100vh;-webkit-text-size-adjust:100%;
  }
  /* Render KaTeX maths in the same font so NUMBERS match the rest of the app. Only the
     base family is overridden (no !important), so KaTeX keeps its italic-variable and
     symbol/delimiter fonts (√, big brackets) while digits & operators use Inter. */
  .katex{font-family:var(--font);font-size:1.08em}  /* numbers a touch bigger than text, not KaTeX's default 1.21em */
  .title h1{font-weight:700;letter-spacing:-.4px}
  .card h2{font-weight:700;letter-spacing:-.3px}
  /* iOS-style switches */
  input[type=checkbox].sw{appearance:none;-webkit-appearance:none;width:46px;height:28px;min-width:46px;border-radius:999px;background:#e3e3e8;position:relative;cursor:pointer;transition:.2s;margin:0;border:none}
  input[type=checkbox].sw:checked{background:var(--ok)}
  input[type=checkbox].sw::after{content:"";position:absolute;top:2px;left:2px;width:24px;height:24px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.3);transition:.2s}
  input[type=checkbox].sw:checked::after{transform:translateX(18px)}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:16px 16px 80px;}
  header.app{display:flex;align-items:center;gap:10px;padding:14px 4px 18px;flex-wrap:wrap}
  .logo{width:42px;height:42px;border-radius:var(--radius-ctrl);flex:0 0 auto;background:linear-gradient(135deg,var(--brand),var(--brand2));display:grid;place-items:center;font-size:23px;box-shadow:var(--shadow)}
  .title h1{font-size:19px;margin:0;letter-spacing:-.3px}
  .title p{margin:2px 0 0;color:var(--muted);font-size:12.5px}
  .spacer{flex:1}
  .iconbtn{border:1px solid var(--line);background:#fff;border-radius:var(--radius-ctrl);width:42px;height:42px;display:grid;place-items:center;cursor:pointer;font-size:18px;color:var(--ink);transition:.15s}
  .iconbtn:hover{border-color:var(--brand);color:var(--brand)}
  .profilechip{display:flex;align-items:center;gap:8px;border:1px solid var(--line);background:#fff;border-radius:999px;padding:5px 12px 5px 6px;cursor:pointer;font-weight:600;font-size:13px}
  .profilechip:hover{border-color:var(--brand)}
  .avatar{width:28px;height:28px;border-radius:50%;display:grid;place-items:center;color:#fff;font-weight:800;font-size:13px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:16px}
  .card h2{margin:0 0 4px;font-size:16px}
  .card .sub{color:var(--muted);font-size:13px;margin:0 0 16px;line-height:1.45}

  .grid{display:grid;gap:12px}
  @media(min-width:560px){.grid.cols2{grid-template-columns:1fr 1fr}.grid.cols3{grid-template-columns:1fr 1fr 1fr}}

  label.field{display:block;margin-bottom:14px}
  label.field > .lbl{display:block;font-size:13px;font-weight:600;margin-bottom:6px;color:var(--ink)}
  label.field > .lbl .hint{font-weight:400;color:var(--muted);font-size:12px}
  input,select,textarea{width:100%;font:inherit;font-size:15px;color:var(--ink);background:#fff;border:1px solid var(--line);border-radius:var(--radius-ctrl);padding:11px 13px;outline:none;transition:.15s}
  input:focus,select:focus,textarea:focus{border-color:var(--brand);box-shadow:0 0 0 3px rgba(0,122,255,.20)}
  textarea{resize:vertical;min-height:70px}

  .btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:var(--radius-ctrl);padding:11px 16px;font:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:.15s;background:var(--card2);color:var(--ink);border:1px solid var(--line);-webkit-tap-highlight-color:transparent}
  .btn:hover{filter:brightness(.98)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--brand);color:#fff;border:none}
  .btn.ghost{background:#fff}
  .btn.block{width:100%}
  .btn.lg{padding:13px 18px;font-size:15.5px}
  .btn.sm{padding:7px 11px;font-size:13px}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.danger{color:var(--bad);border-color:#fecaca;background:#fff}

  .row{display:flex;gap:10px;flex-wrap:wrap}
  .row.end{justify-content:flex-end}
  .row.between{justify-content:space-between;align-items:center}

  .tiles{display:grid;gap:12px;grid-template-columns:1fr 1fr}
  @media(min-width:560px){.tiles{grid-template-columns:repeat(4,1fr)}}
  .tile{background:#fff;border:1px solid var(--line);border-radius:var(--radius-ctrl);padding:16px;text-align:center}
  .tile .n{font-size:22px;font-weight:800;letter-spacing:-.5px}
  .tile .l{font-size:11.5px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}

  .menu{display:grid;gap:12px}
  @media(min-width:560px){.menu{grid-template-columns:1fr 1fr}}
  .menu .item{display:flex;gap:14px;align-items:center;text-align:left;padding:16px;border-radius:var(--radius-ctrl);border:1px solid var(--line);background:#fff;cursor:pointer;transition:.15s}
  .menu .item:hover{border-color:var(--brand);transform:translateY(-2px);box-shadow:var(--shadow)}
  .menu .item .emo{font-size:24px;width:44px;height:44px;border-radius:var(--radius-ctrl);display:grid;place-items:center;background:var(--card2);flex:0 0 auto}
  .menu .item .t{font-weight:700}
  .menu .item .d{font-size:12.5px;color:var(--muted);margin-top:2px}

  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 12px;cursor:pointer;font-size:13px;font-weight:600;transition:.15s;user-select:none}
  .chip[aria-pressed="true"]{background:var(--brand);color:#fff;border-color:var(--brand)}

  .runbar{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.85);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:var(--radius);padding:10px 12px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
  .timer{font-variant-numeric:tabular-nums;font-weight:800;font-size:20px;letter-spacing:.5px}
  .timer.warn{color:var(--bad)}
  .nav-grid{display:flex;flex-wrap:wrap;gap:7px;margin-top:4px}
  .qchip{width:36px;height:36px;border-radius:10px;border:1px solid var(--line);background:#fff;font-weight:700;cursor:pointer;font-size:13px;position:relative}
  .qchip.cur{outline:3px solid rgba(0,122,255,.30);border-color:var(--brand)}
  .qchip.answered{background:#e7f0ff;border-color:#b9d7ff;color:var(--brand)}
  .qchip.flagged::after{content:"";position:absolute;top:-3px;right:-3px;width:11px;height:11px;border-radius:50%;background:var(--warn);border:2px solid #fff}

  .qtext{font-size:16px;line-height:1.6;margin:6px 0 12px}  /* ONE question size everywhere (don't override inline) */
  .opts{display:grid;gap:8px}
  .opt{display:flex;gap:12px;align-items:flex-start;border:1px solid var(--line);border-radius:var(--radius-ctrl);padding:10px 13px;cursor:pointer;background:#fff;transition:.12s;font-size:15px;line-height:1.5}
  .opt:hover{border-color:var(--brand)}
  .opt[aria-pressed="true"]{border-color:var(--brand);background:#e7f0ff}
  .opt .key{flex:0 0 auto;width:26px;height:26px;border-radius:8px;background:var(--card2);display:grid;place-items:center;font-weight:700;font-size:13px}
  .opt[aria-pressed="true"] .key{background:var(--brand);color:#fff}
  .flagrow{display:flex;align-items:center;gap:10px;margin-top:12px;padding-top:10px;border-top:1px dashed var(--line)}

  .scorehero{text-align:center;padding:10px 0 6px}
  .scorehero .pct{font-size:46px;font-weight:800;letter-spacing:-2px;line-height:1;color:var(--brand)}
  .scorehero .frac{color:var(--muted);margin-top:6px}
  .qresult{border:1px solid var(--line);border-radius:var(--radius-ctrl);padding:16px;margin-bottom:12px}
  .qresult.correct{border-color:#bbf7d0;background:#f0fdf4}
  .qresult.wrong{border-color:#fecaca;background:#fef2f2}
  .qresult.review{border-color:#fde68a;background:#fffbeb}
  .badge{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:800;padding:3px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.4px}
  .badge.ok{background:var(--okbg);color:var(--ok)}
  .badge.bad{background:var(--badbg);color:var(--bad)}
  .badge.warn{background:var(--warnbg);color:var(--warn)}
  .explain{background:#fff;border:1px solid var(--line);border-radius:var(--radius-ctrl);padding:14px 16px;margin-top:12px;font-size:14.5px;line-height:1.6}
  .explain .h{font-weight:700;font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:10px}
  .explain p{margin:0 0 10px}
  .explain p:last-child{margin-bottom:0}
  .explain .step{display:flex;gap:10px;align-items:flex-start;margin:0 0 10px}
  .explain .step:last-child{margin-bottom:0}
  .explain .step .n{flex:0 0 auto;width:22px;height:22px;margin-top:1px;border-radius:50%;background:var(--brand);color:#fff;font-size:12px;font-weight:700;display:inline-flex;align-items:center;justify-content:center}
  .explain .step .t{flex:1;min-width:0}
  .explain .bullet{display:flex;gap:10px;align-items:flex-start;margin:0 0 8px}
  .explain .bullet:last-child{margin-bottom:0}
  .explain .bullet .b{flex:0 0 auto;color:var(--brand);font-weight:700;line-height:1.6}
  .explain .bullet .t{flex:1;min-width:0}
  .explain strong{font-weight:700;color:var(--ink)}
  .explain em{font-style:normal;font-weight:600;color:var(--brand)}
  .figure{max-width:420px;margin:4px auto 16px;display:flex;justify-content:center;background:#fff;border:1px solid var(--line);border-radius:var(--radius-ctrl);padding:12px}
  .figure svg{max-width:100%;height:auto;display:block}
  .figure img{max-width:100%;height:auto;display:block;border-radius:6px}
  .qresult .figure{background:#fff}
  .packbox{display:block;width:100%;border:2px dashed var(--brand);background:var(--feature);border-radius:var(--radius);padding:22px;cursor:pointer;text-align:center}
  .pcard{display:inline-block;background:#fff;border:3px solid var(--line);border-radius:16px;padding:14px 18px;position:relative}
  .pcard .pname{font-weight:800;font-size:18px;margin-top:4px}
  .pcard .ptier{font-weight:700;font-size:13px;margin-top:2px}
  .pcard .shiny{position:absolute;top:8px;right:10px;font-size:12px;font-weight:800;color:#f59e0b}
  .dexgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:10px}
  .dexcell{border:2px solid var(--line);border-radius:12px;padding:8px 6px;text-align:center;position:relative;background:#fff}
  .dexcell.own{background:#fff;cursor:pointer}
  .dexcell.own:active{transform:scale(.97)}
  .dexcell.picked{outline:3px solid var(--brand);outline-offset:1px}
  /* ---- battle arena ---- */
  .bt-card{overflow:hidden}
  .bt-arena{position:relative;height:340px;border-radius:var(--radius);overflow:hidden;background:linear-gradient(#bfe3ff 0%,#e8f6ff 55%,#cdeccd 55%,#a6dca6 100%)}
  .bt-floor{position:absolute;left:-10%;right:-10%;bottom:0;height:46%;background:radial-gradient(ellipse at 50% 0,#bfe6a8,#8fce82);transform:perspective(320px) rotateX(48deg);transform-origin:50% 0;opacity:.85}
  .bt-side{position:absolute;display:flex;flex-direction:column;align-items:center;width:170px}
  .bt-foe{top:14px;right:8px}
  .bt-me{bottom:6px;left:8px}
  .bt-mon img{filter:drop-shadow(0 10px 8px rgba(0,0,0,.28))}
  .bt-info{background:#fff;border:1px solid var(--line);border-radius:10px;padding:5px 9px;width:150px;box-shadow:var(--shadow)}
  .bt-name{font-weight:800;font-size:12.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bt-hpwrap{height:8px;border-radius:999px;background:#e4e4ea;overflow:hidden;margin-top:3px}
  .bt-hp{height:100%;width:100%;background:#34c759;border-radius:999px;transition:width .5s ease,background .5s}
  .bt-foe .bt-info{order:0}.bt-foe .bt-mon{order:1}
  .bt-particle{position:absolute;width:9px;height:9px;border-radius:50%;pointer-events:none;z-index:5}
  .bt-dmg{position:absolute;transform:translateX(-50%);font-weight:900;color:#ff3b30;font-size:20px;text-shadow:0 1px 2px #fff;pointer-events:none;z-index:6}
  .bt-dmg.crit{color:#b91c1c;font-size:26px}
  .bt-msg{text-align:center;font-weight:700;margin:12px 0 10px;min-height:22px}
  .bt-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .bt-move{background:var(--feature);color:var(--brand);font-weight:700;border:1px solid #cfe2ff;flex-wrap:wrap;gap:5px}
  .bt-move.util{background:#fff7e6;color:#b45309;border-color:#fde68a}
  .bt-move .mvsub{font-size:10px;font-weight:600;opacity:.75;width:100%}
  .tchip{display:inline-block;padding:2px 8px;border-radius:999px;color:#fff;font-size:10px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;line-height:1.5;text-shadow:0 1px 1px rgba(0,0,0,.22)}
  .bt-types{display:flex;gap:4px;justify-content:center;margin-top:3px}
  .bt-types .tchip{padding:1px 6px;font-size:8.5px}
  .bt-dmg.miss{color:#8e8e93;font-size:17px}
  .bt-dmg.heal{color:#34c759}
  .bt-dmg.buff{color:#007aff;font-size:17px}
  .bt-fx{position:absolute;transform:translateX(-50%);font-weight:900;font-size:13px;pointer-events:none;z-index:6;white-space:nowrap;text-shadow:0 1px 2px #fff}
  .bt-fx.super{color:#16a34a}.bt-fx.resist{color:#9ca3af}.bt-fx.immune{color:#6b7280}
  .bt-badge{display:inline-block;margin-left:5px;font-size:10px;font-weight:800;padding:0 6px;border-radius:6px;vertical-align:middle}
  .bt-badge.burn{background:#ffe3d6;color:#c2410c}
  .bt-badge.para{background:#fff4cc;color:#a16207}
  .dexcell.sel{outline:3px solid var(--brand);outline-offset:-3px}
  .dexcell .selnum{position:absolute;top:4px;left:4px;background:var(--brand);color:#fff;font-size:11px;font-weight:800;min-width:18px;height:18px;padding:0 4px;border-radius:999px;display:flex;align-items:center;justify-content:center;z-index:2}
  .bt-team{display:flex;gap:3px;margin-top:4px;justify-content:center}
  .bt-pip{width:10px;height:10px;border-radius:50%;background:#34c759;border:1px solid rgba(0,0,0,.18)}
  .bt-pip.dead{background:#c7c7cc}
  .bt-pip.act{box-shadow:0 0 0 2px #007aff}
  .dexcell .dn{font-size:11.5px;font-weight:600;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dexcell .dn.muted{color:var(--muted);font-weight:500}
  .dexcell .ds{font-size:10px;letter-spacing:1px}
  .dexcell .cnt{position:absolute;top:4px;right:6px;font-size:11px;font-weight:800;color:var(--ink);background:var(--card2);border-radius:999px;padding:0 6px}
  .dexcell .shy{position:absolute;top:4px;left:6px;font-size:12px}
  .dexcell .sil img{filter:brightness(0);opacity:.22}
  .dexcell .lv{font-size:10.5px;font-weight:700;color:var(--ink);margin-top:2px}
  .dexcell .trainbtn{margin-top:4px;font-size:11px;font-weight:700;border:none;background:var(--feature);color:var(--brand);border-radius:999px;padding:3px 8px;cursor:pointer}
  .dexcell .maxed{margin-top:4px;font-size:10px;font-weight:800;color:var(--ok)}
  .gbar{height:10px;border-radius:999px;background:var(--card2);overflow:hidden}
  .gbar-fill{height:100%;border-radius:999px;background:var(--ok);transition:width .4s ease}
  .streak{display:inline-flex;align-items:center;gap:6px;font-weight:700;color:var(--warn)}
  .chart{margin:6px 0 2px}
  .toprow{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)}
  .toprow:last-child{border-bottom:none}
  .toprow .lbl{flex:0 0 38%;font-size:14px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .toprow .bar{flex:1}
  .ans-line{font-size:14px;margin-top:8px}
  .ans-line b{color:#334155}

  .pill{display:inline-block;font-size:11.5px;color:var(--muted);background:var(--card2);border:1px solid var(--line);border-radius:999px;padding:3px 10px;margin:0 6px 6px 0}
  .refitem{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:var(--radius-ctrl);padding:11px 12px;margin-bottom:8px;background:#fff}
  .refitem .meta{flex:1;min-width:0}
  .refitem .nm{font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .refitem .dt{font-size:11.5px;color:var(--muted)}

  .toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:#1c1c1e;color:#fff;padding:11px 16px;border-radius:var(--radius-ctrl);box-shadow:var(--shadow);z-index:200;font-size:14px;max-width:90vw;opacity:0;pointer-events:none;transition:.25s}
  .toast.show{opacity:1}
  .speakbar{position:fixed;left:50%;bottom:78px;transform:translateX(-50%) translateY(16px);display:flex;gap:8px;align-items:center;background:#1c1c1e;color:#fff;padding:8px 10px 8px 16px;border-radius:999px;box-shadow:var(--shadow);z-index:190;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
  .speakbar.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0)}
  .speakbar .sb-ic{font-size:16px}
  .speakbar .sb-lbl{font-size:14px;margin-right:4px}
  .speakbar .btn{padding:6px 12px;border:none;background:#3a3a3c;color:#fff}
  .speakbar .btn.danger{background:#ff453a;color:#fff}
  .loader{display:grid;place-items:center;padding:40px 0;text-align:center}
  .spinner{width:46px;height:46px;border-radius:50%;border:4px solid #e2e8f0;border-top-color:var(--brand);animation:spin 1s linear infinite;margin-bottom:14px}
  @keyframes spin{to{transform:rotate(360deg)}}
  .muted{color:var(--muted)}.small{font-size:12.5px}.hidden{display:none!important}
  details summary{cursor:pointer;font-weight:600;font-size:13px;color:var(--brand);margin-bottom:8px}
  .statusdot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;background:#cbd5e1}
  .statusdot.on{background:var(--ok)}
  a{color:var(--brand)}
  .empty{text-align:center;color:var(--muted);padding:30px 10px}.empty .big{font-size:40px;margin-bottom:8px}
  .appfoot{text-align:center;color:var(--muted);font-size:12px;padding:28px 0 6px;letter-spacing:.2px}
  .seclabel{font-size:12px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);margin:20px 6px 8px}
  .seclabel:first-child{margin-top:4px}

<script>
/* ============================================================ Practice Lab ============================================================ */
const $=(s,el=document)=>el.querySelector(s);
const $$=(s,el=document)=>[...el.querySelectorAll(s)];
const el=(t,a={},...kids)=>{const n=document.createElement(t);for(const k in a){if(k==='class')n.className=a[k];else if(k==='html')n.innerHTML=a[k];else if(k.startsWith('on'))n.addEventListener(k.slice(2),a[k]);else n.setAttribute(k,a[k]);}for(const c of kids.flat()){if(c==null||c===false)continue;n.append(c.nodeType?c:document.createTextNode(c));}return n;};
const esc=s=>String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
function toast(msg,ms=2800){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),ms);}
function uid(){return 'id'+Math.random().toString(36).slice(2,10)+Date.now().toString(36);}
function fmtTime(sec){sec=Math.max(0,Math.round(sec));const m=Math.floor(sec/60),s=sec%60;return `${m}:${String(s).padStart(2,'0')}`;}
function todayISO(){return new Date().toISOString().slice(0,10);}
/* Turn an AI explanation (plain text + $LaTeX$ + **bold** + numbered steps) into
   readable HTML blocks. Math spans are protected from formatting and re-escaped
   so KaTeX (run by renderMath after insertion) still renders them. */
function fmtExplain(text){
  let raw=String(text??'').replace(/\r/g,'').trim();
  if(!raw)return '';
  const math=[];
  raw=raw.replace(/\$\$[\s\S]*?\$\$|\$(?:\\.|[^$\n])*?\$/g,m=>{math.push(m);return `${math.length-1}`;});
  // Some models emit literal escape sequences ("\n", "\t") instead of real breaks — turn
  // them into real whitespace so numbered steps split correctly. Math spans are protected
  // above, so LaTeX backslashes (\frac, \times) are left untouched.
  raw=raw.replace(/\\r\\n|\\n|\\r/g,'\n').replace(/\\t/g,' ');
  // put each numbered step / "Step N" onto its own line
  raw=raw.replace(/[ \t]+(?=\d+\.\s+(?:\*\*|[A-Z]))/g,'\n');
  raw=raw.replace(/[ \t]+(?=(?:Step|Part)\s+\d+\s*[:.\)])/gi,'\n');
  raw=raw.replace(/[ \t]+(?=\*\s+[A-Za-z($])/g,'\n'); // "* " bullets onto their own line
  const restore=h=>h.replace(/(\d+)/g,(_,i)=>esc(math[i]));
  const inline=t=>restore(esc(t).replace(/\*\*([^*]+?)\*\*/g,'<strong>$1</strong>').replace(/\*([^*\n]+?)\*/g,'<em>$1</em>'));
  return raw.split(/\n+/).map(s=>s.trim()).filter(Boolean).map(line=>{
    const step=line.match(/^(\d+)\.\s+([\s\S]*)$/);
    if(step)return `<div class="step"><span class="n">${step[1]}</span><span class="t">${inline(step[2])}</span></div>`;
    const bull=line.match(/^\*\s+([\s\S]*)$/);
    if(bull)return `<div class="bullet"><span class="b">•</span><span class="t">${inline(bull[1])}</span></div>`;
    return `<p>${inline(line)}</p>`;
  }).join('');
}
/* Allow an optional AI-supplied SVG diagram on a question. Keep only a single
   <svg>…</svg>, and strip scripts, external refs and event handlers. Content
   comes from the user's own AI key, but this is cheap defense-in-depth. */
function sanitizeSvg(s){
  s=String(s||'').trim();
  const a=s.search(/<svg[\s>]/i);if(a<0)return '';
  const b=s.toLowerCase().lastIndexOf('</svg>');if(b<0||b<a)return '';
  s=s.slice(a,b+6);
  if(s.length>20000)return '';
  s=s.replace(/<\s*(script|foreignObject|iframe|image|use|a)\b[\s\S]*?<\s*\/\s*\1\s*>/gi,'');
  s=s.replace(/<\s*(script|foreignObject|iframe|image|use)\b[^>]*\/?>/gi,'');
  s=s.replace(/\son[a-z]+\s*=\s*("[^"]*"|'[^']*'|[^\s>]+)/gi,'');
  s=s.replace(/(?:xlink:href|href)\s*=\s*("[^"]*"|'[^']*')/gi,'');
  return /<svg[\s>]/i.test(s)?s:'';

// A question figure may also carry a real cropped IMAGE (e.g. a map, photo, or
// puzzle from a past paper that can't be drawn as a structured diagram). Only
// allow self-contained data: image URLs — never external/js URLs.
function safeImage(s){s=String(s||'').trim();return /^data:image\/(png|jpe?g|gif|webp|svg\+xml);base64,[A-Za-z0-9+/=\s]+$/i.test(s)?s:'';}
// Build a question's figure block: a structured-diagram/SVG and/or a cropped image.
function figureEl(it){const kids=[];if(it&&it.svg)kids.push(el('div',{html:it.svg}));const img=it&&safeImage(it.image);if(img)kids.push(el('img',{src:img,alt:'figure',loading:'lazy'}));return kids.length?el('div',{class:'figure'},...kids):'';}
function renderMath(scope){if(window.renderMathInElement){try{renderMathInElement(scope||document.body,{delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false},{left:'\\(',right:'\\)',display:false},{left:'\\[',right:'\\]',display:true}],throwOnError:false});}catch(e){}}}
function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=()=>rej(new Error('load '+src));document.head.append(s);});}
function colorFor(str){let h=0;for(const c of String(str||'x'))h=(h*31+c.charCodeAt(0))%360;return `hsl(${h} 65% 55%)`;}

/* WebCrypto helpers for the vault */
function b64e(buf){let s='';const b=new Uint8Array(buf);for(let i=0;i<b.length;i++)s+=String.fromCharCode(b[i]);return btoa(s);}

async function deriveAesKey(pw,salt){const base=await crypto.subtle.importKey('raw',new TextEncoder().encode('plk::'+pw),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:150000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}

/* ---------- IndexedDB ---------- */
const DB_NAME='practicelab',DB_VER=8;let _db=null;

function tx(store,mode='readonly'){return _db.transaction(store,mode).objectStore(store);}
function dbAll(store){return new Promise((res,rej)=>{const out=[];const c=tx(store).openCursor();c.onsuccess=e=>{const cur=e.target.result;if(cur){out.push(cur.value);cur.continue();}else res(out);};c.onerror=e=>rej(e.target.error);});}

function dbDel(store,id){return new Promise((res,rej)=>{const r=tx(store,'readwrite').delete(id);r.onsuccess=()=>res();r.onerror=e=>rej(e.target.error);});}

/* ---------- AI usage meter + question bank (cuts API calls) ----------
   Every generation banks a surplus of questions keyed by the practice setup;
   later sessions with the same setup are served from the bank for free. */
const USAGE_KEY='practicelab.usage';
function usageGet(){let u={};try{u=JSON.parse(localStorage.getItem(USAGE_KEY)||'{}');}catch(e){}return u;}
function usageToday(){return usageGet()[todayISO()]||0;}
function usageBump(n=1){const u=usageGet(),d=todayISO();u[d]=(u[d]||0)+n;const ks=Object.keys(u).sort();while(ks.length>21)delete u[ks.shift()];localStorage.setItem(USAGE_KEY,JSON.stringify(u));}
function freeDailyLimit(){return CFG.provider==='gemini'?20:0;} // 0 = unknown / not free-tier-limited
const BANK_PREFILL=24; // single-call batch when a practice misses the bank — one request serves now + banks a big surplus (the daily limit is requests, not tokens, so we maximise yield per call; the tolerant parser keeps whatever returns if it truncates)
const BANK_DEEP=40;    // total for a manual "stock the bank" pre-generation — fetched reliably in small chunks via generateMany
function normQ(s){return String(s||'').toLowerCase().replace(/\$/g,' ').replace(/[^a-z0-9]+/g,' ').trim().slice(0,180);}
function qhash(s){const t=normQ(s);let h=2166136261>>>0;for(let i=0;i<t.length;i++){h^=t.charCodeAt(i);h=Math.imul(h,16777619);}return 'h'+(h>>>0).toString(36);}
function bankKey(s){return [s.country,s.subject,s.exam,s.level,s.difficulty,s.style].map(x=>String(x==null?'':x).toLowerCase().trim()).join('|');}
function reindex(arr){return arr.map((q,i)=>({...q,id:'q'+i}));}
/* ---------- "remove this question everywhere" block-list ----------
   A parent/student can flag a broken question (wrong image, no correct option, …).
   We tombstone it by (profile, question-hash) so it's dropped from the bank, from
   fresh generations, from mistakes-notebook re-tests and from past-paper packs —
   and, because the map is a flat {"profileId|qhash":ts} synced like packsDeleted,
   it stays gone across devices and can't be resurrected by a Drive merge. */
function blockId(h,p){return (p||pid())+'|'+h;}
function isBlockedHash(h,p){return !!(CFG.blocked||{})[blockId(h,p)];}
function isBlockedQ(qOrText,p){const t=(qOrText&&qOrText.question!=null)?qOrText.question:qOrText;return !!t&&isBlockedHash(qhash(String(t)),p);}

// Delete a question wherever the active student's copies live (bank + notebook) AND
// block it so it never returns. Returns how many stored copies were removed.
async function removeQuestionEverywhere(qOrText){
  const t=(qOrText&&qOrText.question!=null)?qOrText.question:qOrText;if(!t)return 0;
  const h=qhash(String(t));let n=0;
  for(const b of (await dbAll('bank')).filter(b=>b.profileId===pid()&&b.qhash===h)){await dbDel('bank',b.id);n++;}
  for(const r of (await dbAll('review')).filter(r=>r.profileId===pid()&&qhash(String(r.question||''))===h)){await dbDel('review',r.id);n++;}
  blockQuestion(t);scheduleDriveSync();
  return n;
}
async function bankAdd(s,questions){

  for(const q of (questions||[])){
    if(!q||!q.question)continue;const hsh=qhash(q.question);if(seen.has(hsh)||isBlockedHash(hsh)||questionBroken(q))continue;seen.add(hsh);
    await dbPut('bank',{id:uid(),profileId:pid(),key,createdAt:Date.now(),servedCount:0,lastServedAt:0,qhash:hsh,
      country:s.country,subject:s.subject,exam:s.exam,examLabel:s.examLabel,level:s.level,difficulty:s.difficulty,style:s.style,
      topic:q.topic,question:q.question,svg:q.svg,image:q.image,type:q.type,options:q.options,answerIndex:q.answerIndex,
      answer:q.answer,acceptedAnswers:q.acceptedAnswers,explanation:q.explanation,marks:q.marks,hint:q.hint,whyWrong:q.whyWrong});

}
const BANK_CAP=60; // max banked questions kept per setup-key, so the bank can't grow forever
// Keep the freshest, least-practised questions for a key; drop the most-served/oldest beyond the cap.
async function bankPrune(key){
  const pool=(await dbAll('bank')).filter(b=>b.profileId===pid()&&b.key===key);
  if(pool.length<=BANK_CAP)return;
  pool.sort((a,b)=>((b.servedCount||0)-(a.servedCount||0))||(a.createdAt-b.createdAt)); // most-served & oldest first
  for(const b of pool.slice(0,pool.length-BANK_CAP))await dbDel('bank',b.id);
}
// Pull up to `count` matching questions, marking them served. UNSEEN questions
// (never served to this student) come first so every practice feels fresh; already-seen
// ones are only used when `opts.allowSeen` (default true) and unseen stock runs out.
// Honours selected topics strictly, skips blocked questions, and honours opts.exclude
// (a Set of qhashes already chosen this call, so a fill pass can't re-serve them).
async function bankTake(s,count,opts={}){
  const allowSeen=opts.allowSeen!==false,exclude=opts.exclude;
  const key=bankKey(s);
  let pool=(await dbAll('bank')).filter(b=>b.profileId===pid()&&b.key===key&&!isBlockedHash(b.qhash));
  if(exclude&&exclude.size)pool=pool.filter(b=>!exclude.has(b.qhash));
  const topics=(s.topics||[]).map(t=>String(t).toLowerCase());
  if(topics.length)pool=pool.filter(b=>topics.includes(String(b.topic||'').toLowerCase()));
  const servedSort=(a,b)=>((a.servedCount||0)-(b.servedCount||0))||((a.lastServedAt||0)-(b.lastServedAt||0))||(a.createdAt-b.createdAt);
  // Order a set: least-served first; when NO topics were chosen, round-robin across
  // distinct topics (least-practised topic first) for variety.
  const order=arr=>{
    if(topics.length)return arr.slice().sort(servedSort);
    const byTopic={};for(const b of arr){(byTopic[b.topic||'General']=byTopic[b.topic||'General']||[]).push(b);}
    const names=Object.keys(byTopic);for(const t of names)byTopic[t].sort(servedSort);
    names.sort((a,b)=>((byTopic[a][0].servedCount||0)-(byTopic[b][0].servedCount||0))||((byTopic[a][0].lastServedAt||0)-(byTopic[b][0].lastServedAt||0)));
    const out=[];let progressed=true;
    while(progressed){progressed=false;for(const t of names){const a=byTopic[t];if(a.length){out.push(a.shift());progressed=true;}}}
    return out;
  };
  let chosen=order(pool.filter(b=>!(b.servedCount>0))).slice(0,count); // unseen first
  if(allowSeen&&chosen.length<count)chosen=chosen.concat(order(pool.filter(b=>b.servedCount>0)).slice(0,count-chosen.length));
  for(const b of chosen){b.servedCount=(b.servedCount||0)+1;b.lastServedAt=Date.now();await dbPut('bank',b);}
  return chosen.map(b=>({topic:b.topic,type:b.type,question:b.question,svg:b.svg,image:b.image,options:b.options,answerIndex:b.answerIndex,answer:b.answer,acceptedAnswers:b.acceptedAnswers,explanation:b.explanation,marks:b.marks,hint:b.hint,whyWrong:b.whyWrong,fromBank:true}));
}
// Recent question stems the active student has already seen for this setup — fed to
// the generator as an "avoid" list so fresh questions use NEW scenarios/numbers.
async function recentStems(s,limit){
  const key=bankKey(s),out=[],seen=new Set();
  const push=t=>{t=plainMath(String(t||'')).replace(/\s+/g,' ').trim();if(!t)return;const h=qhash(t);if(seen.has(h))return;seen.add(h);out.push(t.slice(0,120));};
  (await dbAll('bank')).filter(b=>b.profileId===pid()&&b.key===key&&b.servedCount>0).sort((a,b)=>(b.lastServedAt||0)-(a.lastServedAt||0)).forEach(b=>push(b.question));
  (await dbAll('attempts')).filter(a=>a.profileId===pid()&&a.subject===s.subject&&(!s.level||a.level===s.level)).sort((a,b)=>b.startedAt-a.startedAt).slice(0,4).forEach(a=>(a.results||[]).forEach(r=>push(r.question)));
  return out.slice(0,limit||20);
}
function dayISO(d){return d.toISOString().slice(0,10);}
// Consecutive-day streak ending today or yesterday, from a list of YYYY-MM-DD strings.
// Uses UTC throughout to stay consistent with todayISO() (which stores attempt dates in UTC).
function computeStreak(dates){
  const set=new Set(dates);if(!set.size)return 0;
  let cur=new Date(todayISO()+'T00:00:00Z');
  if(!set.has(dayISO(cur))){cur.setUTCDate(cur.getUTCDate()-1);if(!set.has(dayISO(cur)))return 0;}
  let n=0;while(set.has(dayISO(cur))){n++;cur.setUTCDate(cur.getUTCDate()-1);}
  return n;
}
async function bankStats(){
  const all=(await dbAll('bank')).filter(b=>b.profileId===pid());
  const groups={};for(const b of all){(groups[b.key]=groups[b.key]||{key:b.key,examLabel:b.examLabel,subject:b.subject,level:b.level,difficulty:b.difficulty,style:b.style,n:0}).n++;}
  return {total:all.length,groups:Object.values(groups).sort((a,b)=>b.n-a.n)};
}

function buildPrompt(s,refsText){

  const topics=chosenTopics?s.topics.join(', ')
    :(known.length?('a WIDE VARIETY across these areas: '+known.join(', ')):'a balanced mix of topics appropriate to the level');
  const styleLine=s.style==='multiple_choice'?'ALL questions must be multiple choice with exactly 4 options.'
    :s.style==='short'?'All questions are short-answer (numeric or short text); do NOT provide options.'
    :'Use a mix: roughly half multiple choice (4 options) and half short-answer/numeric.';
  let p=`You are an expert exam question writer.
Generate ${s.count} original practice questions.

COUNTRY / CURRICULUM: ${s.country}
SUBJECT: ${s.subject}
EXAM / ASSESSMENT: ${exam.label}
YEAR / LEVEL: ${s.level}
EXAM STYLE: ${exam.blurb}
TOPICS TO COVER: ${topics}
DIFFICULTY: ${s.difficulty} (1=gentle warm-up … 5=competition-hard)
FORMAT: ${styleLine}`;

  if(Array.isArray(s.avoid)&&s.avoid.length)p+=`\n\nALREADY-SEEN QUESTIONS — the student has recently practised the ones below. Do NOT repeat or lightly reword them; make GENUINELY DIFFERENT questions (new scenarios, names, numbers and contexts) while keeping the same exam style and topic coverage:\n- ${s.avoid.slice(0,20).map(x=>String(x).replace(/\n/g,' ')).join('\n- ')}`;
  if(refsText&&refsText.trim())p+=`\n\nREAL PAST-PAPER REFERENCE MATERIAL — closely match the style, wording, format, topic coverage and difficulty of these genuine questions. Do NOT copy them verbatim; create fresh equivalents:\n"""\n${refsText.slice(0,12000)}\n"""`;
  else if(s.webSearch)p+=`\n\nUse your knowledge of real ${exam.label} ${s.subject} papers for ${s.country} ${s.level} to match authentic style, topics and difficulty as closely as possible.`;
  if(s.paperImages)p+=`\n\nThe attached images are pages SAMPLED FROM ACROSS A COMPLETE real past paper (beginning, middle and end). A full paper deliberately covers MANY DIFFERENT TOPICS and RAMPS from easy early questions to hard later ones. Study the whole sample, then generate a FULL, VARIED set that mirrors the paper's authentic style and format and reproduces its BREADTH: span the SAME RANGE OF TOPICS and the COMPLETE difficulty range — from the easy warm-ups through to the hardest competition-level questions. Do NOT produce only easy questions, and do NOT limit yourself to the handful of topics visible on any single sampled page. Create fresh originals; never copy a question verbatim.`;
  p+=`

REQUIREMENTS:
- Real exam quality. Order from easier to harder.${chosenTopics?'':` VARIETY IS IMPORTANT: spread the questions across as many DIFFERENT topic areas as the count allows — do NOT put more than about 2 questions on the same topic, so the student practises a broad range.`}
- Use LaTeX for ALL maths, wrapped in single dollar signs, e.g. $\\frac{3}{4}$ or $x^2+5$. Fractions MUST use CURLY BRACES: write $\\frac{1}{2}$ — never $\\frac(1)(2)$ with parentheses. Always escape the backslash (\\frac, not \frac).
- MONEY: put the whole amount inside ONE math span with an escaped dollar sign, e.g. write $\\$27.50$ (renders as a dollar amount). NEVER leave a bare "$" in plain text — two bare $ signs get misread as a maths delimiter and garble the text.
- EXPLANATIONS — keep them SIMPLE, SHORT and easy for a ${s.level} student to read. Match the vocabulary and sentence length to that age: for primary / elementary years use very simple words and very short sentences. Aim for 2–4 short steps; for primary levels keep the whole explanation under ~60 words. Friendly and encouraging.
- Write the FINAL, already-correct explanation only. Do NOT think out loud, second-guess, recheck, or show false starts (never "wait", "let me recheck", "I made a mistake", "actually", "this is not correct", "let's re-think"). Work out the answer privately, then write only the clean, confident solution.
- Structure each explanation as numbered steps: put each step on its OWN line beginning with "1. ", "2. ", etc., separated by a real newline (\n). Bold the key idea of a step with **double asterisks**. One short sentence per step where possible. Do NOT use asterisk bullets or markdown emphasis in the "question" text itself.
- multiple_choice: give "options" (array of 4 strings) and "answerIndex" (0-3); distractors should reflect common mistakes. All 4 options MUST be DISTINCT — never repeat the same value/text in two options (e.g. two "3/8" choices is a bug); make each distractor a genuinely different value.
- HINT: include a short "hint" (one sentence) pointing to the FIRST step or key idea WITHOUT giving away the answer — a nudge for a stuck student.
- WHY-WRONG (multiple_choice only): include "whyWrong" — an array of 4 short strings aligned to "options". For each WRONG option give the likely mistake/misconception that leads a student to pick it (≤ ~12 words, kid-friendly); for the CORRECT option use "". Learning from distractors matters.

- numeric/short: give "answer" (exact) plus "acceptedAnswers" (equivalent correct forms, e.g. ["0.5","1/2"]).
- "marks": whole number; harder questions worth more.
- DIAGRAMS — when a picture genuinely helps (fractions, shapes/geometry, data, time, number sense), add a "diagram" field: a STRUCTURED object {"type":...,...} that the app renders correctly. Do NOT hand-draw SVG for these. Choose the matching type:
  • pie: {"type":"pie","parts":[{"label":"Red","value":3},{"label":"Blue","value":1}]} (add "showPercent":true for a % pie; for a shaded fraction-circle use 2 parts with the unshaded one coloured "#fff")
  • bar: {"type":"bar","title":"Pets","bars":[{"label":"Cat","value":4},{"label":"Dog","value":7}]}
  • numberline: {"type":"numberline","min":0,"max":10,"step":1,"points":[{"value":7,"label":"A"}],"segment":{"from":2,"to":7}}
  • fractionbar: {"type":"fractionbar","rows":[{"parts":4,"shaded":3,"label":"3/4"}]} (each bar splits into equal parts with some shaded)

  • clock: {"type":"clock","h":3,"m":15}
  • pictogram: {"type":"pictogram","icon":"⭐","per":2,"rows":[{"label":"Y5","value":6}]}
  • array: {"type":"array","rows":3,"cols":4,"shaded":5} (rows×cols grid — multiplication / area / fraction-of-a-set)
  • coordinate: {"type":"coordinate","min":0,"max":10,"points":[{"x":2,"y":3,"label":"P"}],"path":true}
  • angle: {"type":"angle","degrees":120}
  • lineplot: {"type":"lineplot","min":0,"max":6,"data":[2,2,3,3,5]} (dot/line plot)
  • venn: {"type":"venn","labelA":"Maths","labelB":"Art","onlyA":7,"both":3,"onlyB":5}
  • tally: {"type":"tally","rows":[{"label":"Red","value":7}]}
  • routemap (schematic map — places + routes with distances, for "how far / which route" questions): {"type":"routemap","scaleLabel":"100 km","places":[{"name":"Town A","x":15,"y":20},{"name":"Town B","x":80,"y":60}],"legs":[{"from":"Town A","to":"Town B","dist":"300 km"}]} (x,y are 0–100 positions)
  • table: {"type":"table","headers":["Day","Sales"],"rows":[["Mon",12],["Tue",9]]}
  • scale (a vertical measuring scale / thermometer — "read the scale", growth, temperature): {"type":"scale","min":0,"max":150,"step":25,"unit":" cm","markers":[{"value":95,"label":"start"},{"value":140,"label":"end"}]}
  • balance (balance scales for equality / simple algebra): {"type":"balance","left":"▲ + ▲ + 3","right":"11"}
  Any type may take an optional "title". Include "diagram" ONLY when it truly helps; omit it otherwise. If a figure you need isn't covered above, you may instead supply a raw inline "svg" string (clean, viewBox'd, NO <script>/external refs) as a fallback.

Return ONLY valid JSON, no markdown fences, exactly:
{"questions":[{"topic":"string","type":"multiple_choice|numeric|short","question":"plain question with $LaTeX$ for maths","diagram":{optional structured spec — see DIAGRAMS above},"options":["a","b","c","d"],"answerIndex":0,"answer":"string","acceptedAnswers":["string"],"hint":"one-sentence nudge, no answer","whyWrong":["","reason for b","reason for c","reason for d"],"explanation":"short, simple, numbered steps","marks":1}]}`;
  return p;
}

async function callGemini(prompt,files,maxTokens,temp){
  const model=CFG.model||'gemini-2.0-flash';
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(model)}:generateContent?key=${encodeURIComponent(CFG.apiKey)}`;
  const parts=[{text:prompt}];
  for(const f of (files||[]))parts.push({inline_data:{mime_type:f.mime,data:f.dataB64}});
  // Strict JSON mode (escapes LaTeX backslashes correctly). For 2.5 "thinking"
  // models, disable thinking AND give a large output budget — otherwise hidden
  // thinking eats the budget and the JSON answer gets truncated. Budget scales
  // with batch size so large bank pre-generations complete in one call.
  const gc={temperature:(temp==null?0.8:temp),responseMimeType:'application/json',maxOutputTokens:maxTokens||16384};
  if(/2\.5|thinking|gemini-flash|gemini-pro/i.test(model))gc.thinkingConfig={thinkingBudget:0,includeThoughts:false};
  const body=JSON.stringify({contents:[{parts}],generationConfig:gc});
  let r,attempt=0;
  while(true){
    r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body});
    if(r.ok)break;
    // Retry only transient server errors (busy). Do NOT retry 429 — that's a
    // quota limit, and retrying just burns more of it.
    if((r.status===503||r.status===500)&&attempt<4){attempt++;await new Promise(res=>setTimeout(res,1500*attempt));continue;}
    const t=(await r.text()).slice(0,400);
    let msg=t;
    if(r.status===503)msg='the model is busy right now — please try again in a moment.';
    else if(r.status===429)msg='daily free-tier limit reached for this model/key. Try again later, switch model, or enable billing (see SETUP.md).';
    throw new Error('Gemini '+r.status+': '+msg);
  }
  const j=await r.json();
  const cand=j?.candidates?.[0];
  const text=(cand?.content?.parts||[]).filter(p=>!p.thought).map(p=>p.text).filter(Boolean).join('');
  if(!text){const reason=cand?.finishReason||j?.promptFeedback?.blockReason||'empty response';throw new Error('Gemini returned no text (finishReason: '+reason+'). Try fewer questions or model gemini-2.0-flash.');}
  return text;
}

// Parse + normalise an AI response into the app's question shape. The heavy
// lifting (tolerant/partial JSON recovery) lives in parse.js (PLParse); here we
// just map the recovered objects and sanitise the optional SVG. Returns [] for
// an unrecoverable response (callers decide whether that's fatal).
function parseQuestions(raw){
  const P=(typeof PLParse!=='undefined')?PLParse:null;
  if(!P)throw new Error('Parser module (parse.js) failed to load.');
  const arr=P.extractQuestions(raw);
  return arr.map((q,i)=>{const opts=P.qOpts(q);let ai=(typeof q.answerIndex==='number')?q.answerIndex:(typeof q.correctIndex==='number'?q.correctIndex:null);
    const type=(q.type||(opts&&opts.length?'multiple_choice':'short'));
    // MC self-consistency: if the model's stated answer TEXT clearly matches a
    // different option than answerIndex, trust the text (catches some mis-keys).
    if(type==='multiple_choice'&&opts&&opts.length&&q.answer!=null){
      const norm=x=>String(x).toLowerCase().replace(/\$/g,'').replace(/\\frac\{([^{}]*)\}\{([^{}]*)\}/g,'$1/$2').replace(/\\[a-z]+/g,'').replace(/[^a-z0-9/.]/g,'');
      const t=norm(q.answer);if(t){const j=opts.findIndex(o=>norm(o)===t);if(j>=0&&j!==ai)ai=j;}
    }
    // Diagram: prefer a STRUCTURED spec (q.diagram/chart/figure as an object) rendered
    // by PLDiagram into correct SVG; else fall back to a raw inline-SVG string.
    let svgRaw=q.svg||q.image||'';const dgm=q.diagram||q.chart||q.figure;
    if(dgm&&typeof dgm==='object'&&typeof PLDiagram!=='undefined'){try{const dd=PLDiagram.render(dgm);if(dd)svgRaw=dd;}catch(e){}}
    else if(typeof dgm==='string'&&!svgRaw){svgRaw=dgm;}
    const o={id:'q'+i,topic:q.topic||q.category||q.strand||'General',
      type,
      question:P.qText(q),options:opts,answerIndex:ai,
      answer:(q.answer!=null)?String(q.answer):(opts&&typeof ai==='number'?String(opts[ai]):''),
      acceptedAnswers:Array.isArray(q.acceptedAnswers)?q.acceptedAnswers.map(String):(Array.isArray(q.accepted)?q.accepted.map(String):[]),
      explanation:q.explanation||q.solution||q.working||q.reason||'',marks:Number(q.marks||q.mark||q.points)||1,
      hint:(q.hint!=null?String(q.hint):''),whyWrong:Array.isArray(q.whyWrong)?q.whyWrong.map(x=>x==null?'':String(x)):[],
      svg:sanitizeSvg(svgRaw),image:safeImage(q.image),
      // Keep the STRUCTURED figure spec so verifyQuestions can hand it to the
      // checker as `figure` and solve chart/table/pictograph reads against the
      // ACTUAL values (v2.29 — without this the figure-aware verify never saw a
      // figure, so mismatches like "April − March" pictographs slipped through).
      // In-memory only: the bank/attempt/review spreads whitelist fields and don't
      // persist it, so blast radius is nil (the rendered `svg` is what's stored).
      diagram:(dgm&&typeof dgm==='object')?dgm:undefined};return fixQuestion(o);});
}
// Mis-key backstop: trust the worked explanation's CONCLUDED value over a
// possibly wrong answer key. Models sometimes set BOTH "answer" and
// "answerIndex" to the same wrong option while their step-by-step explanation
// correctly arrives at a different value (e.g. explains "80 × 2.5 = 200 km" but
// keys 180; or lists the 9 divisors of 36 then keys 6). When the explanation's
// final numeric value UNIQUELY matches a different option, re-point the key to
// it. No-op when the key already agrees, so correctly-keyed questions are never

    const gen=await generateQuestions({...s,count:batch,...(avoid&&avoid.length?{avoid}:{})},files);
    const fresh=clean(gen).slice(0,want);
    if(!wantsFresh){const servedH=new Set(fresh.map(q=>qhash(q.question)));await bankAdd(s,gen.filter(q=>q&&q.question&&!servedH.has(qhash(q.question))));}
    return fresh;
  };
  const finish=(served,source,apiCalls)=>{
    const seen=new Set();served=served.filter(q=>{const h=qhash(q.question||'');if(!h||seen.has(h))return false;seen.add(h);return true;}); // no repeat within one practice
    return {questions:reindex(served.slice(0,count)).map(fixQuestion),source,apiCalls};
  };
  if(wantsFresh)return finish(await genServe(count),'fresh',1);
  // 1) UNSEEN bank questions first — keeps every practice fresh (0 API calls).
  let served=clean(await bankTake(s,count,{allowSeen:false}));
  let apiCalls=0,genErr=null;
  // 2) Short on unseen? Auto: generate fresh while under the daily free limit — new
  //    scenarios in the same style, told to avoid what the student has already seen.
  const lim=freeDailyLimit();
  if(served.length<count&&CFG.apiKey&&(!lim||usageToday()<lim)){
    try{served=served.concat(await genServe(count-served.length));apiCalls=1;}
    catch(e){genErr=e;} // limit/transient/no-key — fall back to the bank below
  }
  // 3) Still short (limit reached / offline / partial) → rotate in already-seen bank items.
  if(served.length<count){const have=new Set(served.map(q=>qhash(q.question)));served=served.concat(clean(await bankTake(s,count-served.length,{allowSeen:true,exclude:have})));}
  // 4) Truly nothing to show (empty bank + generation blocked) → force one generation
  //    so a practice is never blank; if that also fails, surface the real error.
  if(!served.length){if(genErr)throw genErr;served=await genServe(count);apiCalls=1;}
  return finish(served,apiCalls?(served.some(q=>q.fromBank)?'mixed':'generated'):'bank',apiCalls);
}

// Correct answer as readable text ("C. 3/4" for MC, else the plain answer).
function correctAnswerText(q){

// Re-explain a question in the SIMPLEST possible way for a student who found the normal
// explanation confusing. Renders into `host`; `save(txt)` (optional) caches it so re-opening
// costs no AI. `ctx` supplies {level, subject} for age-appropriate wording.
async function explainSimpler(q,ctx,host,save){
  if(!CFG.apiKey){toast('Add an AI key in Settings to get a simpler explanation.');return;}
  ctx=ctx||{};
  host.innerHTML='';host.append(el('div',{class:'small muted'},'✨ Thinking of a simpler way to explain this…'));
  const opts=(q.type==='multiple_choice'&&Array.isArray(q.options))?('\nOptions:\n'+q.options.map((o,i)=>String.fromCharCode(65+i)+'. '+plainMath(String(o))).join('\n')):'';
  const prompt=`A ${ctx.level||''} student found the explanation for this ${ctx.subject||''} question hard to understand. Re-explain how to reach the answer in the SIMPLEST possible way for that child.
RULES: very short sentences; everyday words a young student knows; ONE idea per step. Put EACH numbered step on its OWN line, starting "1. ", "2. ", … , with a REAL line break between them — do NOT write the two characters backslash-n. Use plain symbols for arithmetic: × for multiply and ÷ for divide (e.g. "15 × 20 = 300"); ONLY use $...$ for fractions or powers (write fractions as \\frac{a}{b}). Use a concrete real-life example or analogy if it helps. No jargon. Finish by clearly stating the answer. Keep it under ~90 words. Be warm and encouraging.
QUESTION: ${plainMath(q.question)}${opts}
CORRECT ANSWER: ${correctAnswerText(q)}
ORIGINAL EXPLANATION: ${plainMath(q.explanation||'')}
Return ONLY the explanation text itself — plain text with REAL line breaks. Do NOT wrap it in quotes, JSON, or code fences.`;
  try{
    let raw=await callAI(prompt,1200,0.3);usageBump(1);
    let txt=String(raw||'').trim().replace(/^```[a-z]*\s*/i,'').replace(/```\s*$/,'').trim();

    // unwrap it (JSON.parse also turns \n into real breaks); fmtExplain handles any leftover.
    if(/^".*"$/s.test(txt)){try{const p=JSON.parse(txt);if(typeof p==='string')txt=p.trim();}catch(e){txt=txt.replace(/^"|"$/g,'').trim();}}
    if(!txt){host.innerHTML='';host.append(el('div',{class:'small muted'},'Couldn’t simplify that one — please try again.'));return;}
    host.innerHTML='';host.append(el('div',{class:'h'},'🧒 Simpler explanation'),el('div',{html:fmtExplain(txt)}));
    renderMath(host);
    if(save){try{q.simpleExplanation=txt;await save(txt);}catch(e){}}
  }catch(e){host.innerHTML='';host.append(el('div',{class:'small muted'},'Couldn’t simplify: '+(e.message||e)));}
}

/* ============================================================ Marking ============================================================ */
function normNum(s){if(s==null)return null;const m=String(s).replace(/[, $%]/g,'').match(/-?\d+(\.\d+)?/);return m?parseFloat(m[0]):null;}
function normTxt(s){return String(s??'').toLowerCase().replace(/\s+/g,' ').replace(/[. ]+$/,'').trim();}
// Value of an answer allowing fractions / mixed numbers / money / times (reuses the
// robust plValTokens parser), so "1/2" ↔ "0.5", "1 3/4" ↔ "1.75", "$5" ↔ "5" all match.
function answerNum(s){if(s==null)return null;const t=(typeof plValTokens==='function')?plValTokens(s).tokens:[];return t.length?t[0].val:null;}
function gradeAnswer(q,userAns){
  if(userAns==null||userAns===''||userAns===-1)return {status:'wrong',auto:true,blank:true};
  if(q.type==='multiple_choice')return {status:(Number(userAns)===Number(q.answerIndex))?'correct':'wrong',auto:true};
  const candidates=[q.answer,...(q.acceptedAnswers||[])].filter(x=>x!=null&&x!=='');
  const ua=String(userAns);
  if(candidates.some(c=>normTxt(c)===normTxt(ua)))return {status:'correct',auto:true};
  const un=normNum(ua);
  if(un!=null&&candidates.some(c=>{const cn=normNum(c);return cn!=null&&Math.abs(cn-un)<1e-6;}))return {status:'correct',auto:true};
  // Fraction / mixed-number / money equivalence (accepts different-but-equal forms).
  const uv=answerNum(ua);
  if(uv!=null&&candidates.some(c=>{const cv=answerNum(c);return cv!=null&&Math.abs(cv-uv)<1e-6;}))return {status:'correct',auto:true};
  if(q.type==='short')return {status:'review',auto:false};
  return {status:'wrong',auto:true};
}

/* ============================================================ Reference papers ============================================================ */
function abToB64(ab){let bin='';const bytes=new Uint8Array(ab);const chunk=0x8000;for(let i=0;i<bytes.length;i+=chunk)bin+=String.fromCharCode.apply(null,bytes.subarray(i,i+chunk));return btoa(bin);}
async function ensurePdfJs(){if(window.pdfjsLib)return;await loadScript('https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js');pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';}
async function extractPdfText(ab){await ensurePdfJs();const pdf=await pdfjsLib.getDocument({data:ab.slice(0)}).promise;let t='';for(let p=1;p<=Math.min(pdf.numPages,30);p++){const page=await pdf.getPage(p);const c=await page.getTextContent();t+=c.items.map(i=>i.str).join(' ')+'\n';}return t.trim();}
// Render up to `maxPages` of a PDF to downscaled JPEGs, SAMPLED EVENLY across the
// whole document (not just the first pages) so the reference captures the paper's
// full topic range and its easy→hard difficulty progression. Light images instead
// of a whole scanned PDF keep the multimodal request small (big payloads are what
// make Gemini 503) while still representing the entire paper.
async function pdfPagesToImages(u8,maxPages){
  await ensurePdfJs();
  const pdf=await pdfjsLib.getDocument({data:u8.slice(0)}).promise;
  const total=pdf.numPages,want=Math.min(total,maxPages||10);
  const pages=[];
  if(want>=total){for(let p=1;p<=total;p++)pages.push(p);}
  else for(let k=0;k<want;k++)pages.push(1+Math.round(k*(total-1)/(want-1)));
  const uniq=[...new Set(pages)],out=[];
  for(const p of uniq){
    const page=await pdf.getPage(p),base=page.getViewport({scale:1});
    const scale=Math.min(2,1000/base.width),vp=page.getViewport({scale});
    const cv=document.createElement('canvas');cv.width=Math.round(vp.width);cv.height=Math.round(vp.height);
    await page.render({canvasContext:cv.getContext('2d'),viewport:vp}).promise;
    out.push({mime:'image/jpeg',dataB64:cv.toDataURL('image/jpeg',0.6).split(',')[1]});
  }
  return out;
}
// Convert a reference paper into a LIGHT inline payload for grounding: a PDF
// becomes its first few pages as JPEGs; images pass through; falls back to the
// original file if rendering fails.
async function refToInlineFiles(ref,maxPages){
  if(!ref||!ref.dataB64)return []; // metadata-only ref (e.g. synced from another device) → not groundable here
  try{
    if(ref.mime==='application/pdf'){
      const imgs=await pdfPagesToImages(b64d(ref.dataB64),maxPages||4);
      if(imgs.length)return imgs;
    }
  }catch(e){console.warn('pdf→image',e);}
  return [ref];
}
async function ingestFile(file,tags){
  const ab=await file.arrayBuffer();
  const mime=file.type||(file.name.endsWith('.pdf')?'application/pdf':file.name.match(/\.(txt|md|csv)$/)?'text/plain':'application/octet-stream');
  let text='';
  try{
    if(mime==='application/pdf')text=await extractPdfText(ab);
    else if(mime.startsWith('text/')||/\.(txt|md|csv)$/i.test(file.name))text=new TextDecoder().decode(ab);
  }catch(e){console.warn('extract',e);}
  return {id:uid(),profileId:tags.scope==='all'?'all':pid(),name:file.name,mime,size:file.size,dataB64:abToB64(ab),text:text.slice(0,16000),tags,addedAt:Date.now()};
}

const CHART={brand:'#007aff',line:'#e4e4ea',muted:'#8a8a8e',ok:'#34c759',warn:'#ff9500',bad:'#ff3b30'};

function chartLine(series){ // series: [{value 0-100}]
  const w=320,h=120,pad=10,bot=12,n=series.length;if(!n)return el('div',{});

  const area=`M ${series.map((s,i)=>`${xs(i).toFixed(1)},${ys(s.value).toFixed(1)}`).join(' L ')} L ${xs(n-1).toFixed(1)},${(pad+iH).toFixed(1)} L ${xs(0).toFixed(1)},${(pad+iH).toFixed(1)} Z`;
  const grid=[0,50,100].map(v=>`<line x1="${pad}" y1="${ys(v).toFixed(1)}" x2="${w-pad}" y2="${ys(v).toFixed(1)}" stroke="${CHART.line}"/>`).join('');

function chartBars(series){ // series: [{label,value}]
  const w=320,h=120,pad=10,bot=20,n=series.length;if(!n)return el('div',{});
  const iW=w-pad*2,iH=h-pad-bot,max=Math.max(1,...series.map(s=>s.value)),gap=iW/n,bw=Math.min(26,gap*0.62);
  const bars=series.map((s,i)=>{const bh=iH*s.value/max,x=pad+gap*i+(gap-bw)/2,y=pad+iH-bh;return `<rect x="${x.toFixed(1)}" y="${y.toFixed(1)}" width="${bw.toFixed(1)}" height="${Math.max(0,bh).toFixed(1)}" rx="2" fill="${CHART.brand}" opacity="${s.value?'.85':'.18'}"/>`;}).join('');
  const labels=series.map((s,i)=>`<text x="${(pad+gap*i+gap/2).toFixed(1)}" y="${h-6}" font-size="9" text-anchor="middle" fill="${CHART.muted}">${esc(s.label)}</text>`).join('');

/* ----- Past papers (PRIVATE real-question packs) -----
   Packs are transcribed real exam questions. They live in the SHARED, Drive-synced
   `packs` store — imported once from a JSON file (a parent's device) and synced to
   every device, so they work on the public Pages URL without ever being in the repo.
   Drilled directly (not via the difficulty-keyed bank); real figures/photos ride
   along as cropped images and structured-diagram specs render via PLDiagram. */
// Minutes for a timed exam run of a pack: pack-specified, else ~1 min/question
// (the ICAS norm), clamped to a sensible 10–75 min.
function paperMins(pk){return Math.max(10,Math.min(75,(pk.timeLimitMin||(pk.setup&&pk.setup.timeLimitMin)||((pk.questions||[]).length||10))));}
function startPaper(pk,timed){
  const setup=Object.assign({country:'',subject:pk.subject||'Maths',exam:pk.exam||'icas',examLabel:pk.title||'Past paper',level:pk.level||'',topics:[],difficulty:3,style:'paper',timeLimitMin:0},pk.setup||{});
  setup.timeLimitMin=timed?paperMins(pk):0; // timed exam = countdown + auto-submit; else untimed practice
  if(timed)setup.examLabel='⏱ '+setup.examLabel;
  // Pack answers are curated/verified, so we TRUST answerIndex — do NOT run the
  // AI mis-key backstop here (it can mis-fire on non-numeric answers like "leave
  // out the + card" whose explanation contains numbers matching other options).
  // We DO collapse any accidental duplicate options (safe — it only merges exact
  // copies and re-points the key to the survivor), guarding against a bad transcription.
  const qs=(pk.questions||[]).filter(q=>!isBlockedQ(q)).map((q,i)=>{ // honour "removed" questions per student
    let svg=q.svg||'';
    if(q.diagram&&typeof q.diagram==='object'&&typeof PLDiagram!=='undefined'){try{const d=PLDiagram.render(q.diagram);if(d)svg=d;}catch(e){}}
    return dedupeOptions(repairQ(Object.assign({},q,{id:'q'+i,svg:sanitizeSvg(svg),image:safeImage(q.image)})));
  }).map((q,i)=>({...q,id:'q'+i}));
  if(!qs.length)return toast('This paper has no questions yet.');
  startSession(setup,qs,'practice');viewRun();
}
function packSlug(p){return ('pack:'+[p.subject,p.level,p.year,p.title].filter(Boolean).join('-')).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+/g,'-').slice(0,80);}
// Import one or more packs from a JSON file (a pack object, an array, or {packs:[…]}).
// Import-time sanity check for a pack. Catches the transcription slips that make
// a question wrong or unanswerable: duplicate multiple-choice options, an
// answerIndex out of range, or an answer whose text doesn't match the keyed
// option. Returns a list of human-readable issues ([] when clean). Non-blocking —
// the pack still imports; we just surface the problems so they can be fixed.
function packIssues(p){
  const out=[],norm=x=>plainMath(String(x==null?'':x)).toLowerCase().replace(/\s+/g,'').replace(/[.,;]+$/,'');
  (p.questions||[]).forEach((q,i)=>{
    const at='“'+(p.title||p.id||'pack')+'” Q'+(i+1);
    if(q.type!=='multiple_choice')return;
    const o=Array.isArray(q.options)?q.options:[];
    if(o.length<2){out.push(at+': fewer than 2 options');return;}
    const seen={};o.forEach(x=>{const k=norm(x);if(k&&seen[k])out.push(at+': duplicate option “'+plainMath(String(x))+'”');seen[k]=1;});
    if(typeof q.answerIndex!=='number'||q.answerIndex<0||q.answerIndex>=o.length){out.push(at+': answerIndex '+q.answerIndex+' out of range (0–'+(o.length-1)+')');return;}
    if(q.answer!=null){const a=norm(q.answer),ka=norm(o[q.answerIndex]);if(a&&ka&&a!==ka&&ka.indexOf(a)<0&&a.indexOf(ka)<0)out.push(at+': answer “'+plainMath(String(q.answer))+'” ≠ keyed option “'+plainMath(String(o[q.answerIndex]))+'”');}
  });
  return out;
}
// Import one or MANY pack files at once. Each file is parsed independently so a single
// unreadable file doesn't abort the rest — its name is collected and reported at the end.
async function importPacks(files){
  const list=(files&&files.length!=null)?Array.from(files):[files]; // accept a FileList, an array, or one File
  if(!list.length)return;
  let n=0,issues=[],failed=[];CFG.packsDeleted=CFG.packsDeleted||{};
  for(const file of list){
    try{
      const data=JSON.parse(await file.text());
      let arr=Array.isArray(data)?data:(Array.isArray(data.packs)?data.packs:[data]);
      arr=arr.filter(p=>p&&Array.isArray(p.questions)&&p.questions.length);
      if(!arr.length){failed.push((file.name||'a file')+' (no questions)');continue;}
      for(const p of arr){p.id=p.id||packSlug(p);p.updatedAt=Date.now();if(CFG.packsDeleted[p.id])delete CFG.packsDeleted[p.id];await dbPut('packs',p);n++;const iss=packIssues(p);if(iss.length)issues.push(...iss);}
    }catch(e){failed.push((file.name||'a file')+': '+(e.message||e));}
  }
  saveCfg();scheduleDriveSync();
  if(issues.length)console.warn('⚠️ Pack import found '+issues.length+' question issue(s):\n • '+issues.join('\n • '));
  if(failed.length)console.warn('⚠️ '+failed.length+' file(s) could not be imported:\n • '+failed.join('\n • '));
  let msg=n?('Imported '+n+' pack'+(n>1?'s':'')):'No packs imported';
  if(issues.length)msg+=' · ⚠️ '+issues.length+' question issue(s) (see console)';
  if(failed.length)msg+=' · '+failed.length+' file(s) failed (see console)';
  else if(n)msg+=' — syncing to your devices…';
  toast(msg);
  viewPapers();
}

// Seed packs from a bundled papers.local.js (window.PL_QUESTION_PACKS) on boot — for
// local/dev use; on the public Pages site packs arrive via import + Drive sync instead.
async function seedLocalPacks(){
  try{const arr=(typeof window!=='undefined'&&window.PL_QUESTION_PACKS)||[];if(!arr.length)return;

function startTimer(){stopTimer();timerInt=setInterval(()=>{S.elapsed=Math.round((Date.now()-S.startedAt)/1000);const t=$('#timerEl');if(!t)return;if(S.limitSec){const left=S.limitSec-S.elapsed;t.textContent=fmtTime(left);t.classList.toggle('warn',left<=60);if(left<=0){stopTimer();toast('Time’s up! Submitting…');submitSession();}}else t.textContent=fmtTime(S.elapsed);},1000);}

const SR_DAYS=[1,3,7,14];
function srNext(timesCorrect){return Date.now()+SR_DAYS[Math.min(Math.max(0,timesCorrect),SR_DAYS.length-1)]*86400000;}
function reviewDue(r){return !r.mastered&&(r.dueAt==null||r.dueAt<=Date.now());}

async function difficultySuggestion(a){
  const d=+a.difficulty;if(!(d>=1&&d<=5))return null;

    if(questionBroken(q)){r.status='review';r.broken=true;r.auto=false;}
    return r;});
  if(S.mode!=='review'){try{await aiGradeFreeText(S.settings,results.filter(r=>!r.broken));}catch(e){console.warn('aiGrade',e);}}
  for(const r of results)if(r.broken)logFlag({at:todayISO(),profileId:pid(),student:activeProfile().name,topic:r.q.topic||'General',q:plainMath(String(r.q.question||'')).slice(0,110),from:'auto',to:'broken (no correct answer)',exam:S.settings.examLabel||'',level:S.settings.level||''});
  const totalMarks=S.questions.reduce((s,q)=>s+q.marks,0);
  const gotMarks=results.reduce((s,r)=>s+(r.status==='correct'?r.q.marks:0),0);
  const percent=totalMarks?Math.round(gotMarks/totalMarks*100):0;
  const attempt={id:S.id,profileId:pid(),date:todayISO(),startedAt:S.startedAt,student:activeProfile().name,mode:S.mode,
    country:S.settings.country,subject:S.settings.subject,exam:S.settings.exam,examLabel:S.settings.examLabel,level:S.settings.level,
    topicsRequested:S.settings.topics,difficulty:S.settings.difficulty,count:S.questions.length,elapsed:S.elapsed,totalMarks,gotMarks,percent,
    correct:results.filter(r=>r.status==='correct').length,wrong:results.filter(r=>r.status==='wrong').length,needsReview:results.filter(r=>r.status==='review').length,flagged:results.filter(r=>r.flagged).length,
    results:results.map(r=>({topic:r.q.topic,type:r.q.type,question:r.q.question,svg:r.q.svg,image:r.q.image,options:r.q.options,answerIndex:r.q.answerIndex,answer:r.q.answer,acceptedAnswers:r.q.acceptedAnswers,explanation:r.q.explanation,marks:r.q.marks,hint:r.q.hint,whyWrong:r.q.whyWrong,userAns:r.userAns,flagged:r.flagged,status:r.status,auto:r.auto,broken:r.broken||false}))};
  await dbPut('attempts',attempt);
  // Practice mode: file each wrong / self-check / flagged question into the mistakes
  // notebook (due now). REVIEW re-tests don't file new items — the submitSession
  // wrapper (below) updates the existing item's mastery + spaced-repetition due date.
  if(S.mode!=='review'){
    // De-dupe on filing: one notebook entry PER QUESTION (profile+qhash). If the same
    // question is missed again it refreshes the existing entry (bump timesSeen, re-open
    // for revision) instead of creating a duplicate — fixes the notebook filling with
    // repeats of the same question.
    const existing={};for(const x of (await dbAll('review')).filter(x=>x.profileId===pid()))existing[qhash(String(x.question||''))]=x;
    for(const r of results){
      if(r.broken)continue;
      if(!(r.status==='wrong'||r.status==='review'||r.flagged))continue;
      const h=qhash(String(r.q.question||'')),prev=existing[h],reason=r.flagged?'flagged':(r.status==='review'?'review':'wrong');
      if(prev){
        prev.timesSeen=(prev.timesSeen||0)+1;prev.dueAt=Date.now();prev.reason=reason;
        if(r.status==='wrong'||r.status==='review'){prev.timesCorrect=0;prev.mastered=false;} // missed again → re-open
        await dbPut('review',prev);
      }else{
        const rec={id:uid(),profileId:pid(),createdAt:Date.now(),date:todayISO(),dueAt:Date.now(),attemptId:S.id,exam:S.settings.exam,subject:S.settings.subject,level:S.settings.level,topic:r.q.topic,reason,timesSeen:1,timesCorrect:0,mastered:false,question:r.q.question,svg:r.q.svg,image:r.q.image,type:r.q.type,options:r.q.options,answerIndex:r.q.answerIndex,answer:r.q.answer,acceptedAnswers:r.q.acceptedAnswers,explanation:r.q.explanation,marks:r.q.marks,hint:r.q.hint,whyWrong:r.q.whyWrong};
        await dbPut('review',rec);existing[h]=rec;
      }
    }
  }
  // Rewards (practice mode): XP from correct answers × difficulty (quality), candy
  // for completing (effort — even low accuracy earns some), and a Poké-Pack card if
  // ≥PACK_MIN_Q and within the daily cap. Rarity is rolled from THIS result;
  // duplicates convert to candy. All stored on the attempt so results can show them.
  if(S.mode==='practice'&&S.questions.length>=1){
    try{
      const diff=attempt.difficulty||3;
      const before=trainerLevel((await trainerGet()).xp);
      const firstToday=(await dbAll('attempts')).filter(a=>a.profileId===pid()&&a.date===todayISO()).length<=1;
      // XP: participation (effort) + correctness×difficulty (quality) + a daily-return bonus.
      let xpGain=attempt.count + attempt.correct*(1+diff) + (firstToday?15:0);
      // Candy: a flat effort floor (even low accuracy earns) + a quality bit + daily bonus.
      let candyGain=4 + Math.round(attempt.correct/2) + (firstToday?4:0);
      let card=null;
      if(S.questions.length>=PACK_MIN_Q&&packsToday()<PACK_DAILY_CAP){
        const streak=computeStreak((await dbAll('attempts')).filter(a=>a.profileId===pid()).map(a=>a.date));
        card=rollCard(attempt.percent,diff,streak);
        const aw=await cardAward(card);bumpPacks();
        // Duplicate → the extra copy is KEPT by default (adds to ×count for battles/trades);
        // the kid can later choose on the results screen to convert it to candy instead.
        if(aw.dupe){card.dupe=true;card.dupeCandy=card.tier*4;card.count=aw.rec.count;}
        // "double next pack" buff won from a battle → award a 2nd card, then clear it.
        const tb=await trainerGet();
        if(tb.dblPack){const c2=rollCard(attempt.percent,diff,streak);const aw2=await cardAward(c2);if(aw2.dupe){c2.dupe=true;c2.dupeCandy=c2.tier*4;c2.count=aw2.rec.count;}attempt.reward2=c2;tb.dblPack=false;tb.updatedAt=Date.now();await dbPut('trainer',tb);}
      }
      // ⚡ Battle energy: 1 per practice, +1 at ≥80% accuracy (gates the battle game behind practising).
      const energyGain=1+(attempt.percent>=80?1:0);
      if(typeof battleAddEnergy==='function')await battleAddEnergy(energyGain);
      const after=await trainerAdd(xpGain,candyGain);
      attempt.xpGain=xpGain;attempt.candyGain=candyGain;attempt.energyGain=energyGain;if(card)attempt.reward=card;
      const lvlAfter=trainerLevel(after.xp);if(lvlAfter.level>before.level)attempt.levelUp=lvlAfter.level;
      await dbPut('attempts',attempt);
    }catch(e){console.warn('rewards',e);}
  }
  // Adaptive difficulty (practice only): suggest a level change, or auto-apply it
  // when the parent has turned that on. Recorded on the attempt so results can show it.
  if(S.mode==='practice'){
    try{
      const sug=await difficultySuggestion(attempt);
      if(sug){
        if(CFG.autoDifficulty){applyDifficulty(sug.to);attempt.diffApplied=sug;}
        else attempt.diffSuggest=sug;
        await dbPut('attempts',attempt);
      }
    }catch(e){console.warn('adaptive',e);}
  }
  scheduleDriveSync();
  sendSummaryEmail(attempt).catch(e=>console.warn('email',e));
  viewResults(attempt);
}

// Printable worksheet: opens a clean print window with the questions (LaTeX
// flattened via plainMath so it reads without KaTeX) + a separate answer key.
function printWorksheet(questions,title){
  const w=window.open('','_blank');if(!w){toast('Allow pop-ups to print the worksheet.');return;}
  const e2=s=>String(s==null?'':s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
  const L=['A','B','C','D','E','F'];let qh='',ak='';
  (questions||[]).forEach((it,i)=>{
    const fig=it.svg?('<div class="fig">'+it.svg+'</div>'):(it.image?('<div class="fig"><img src="'+e2(it.image)+'"></div>'):'');
    const opts=(it.type==='multiple_choice'&&Array.isArray(it.options))?('<ol class="opts">'+it.options.map(o=>'<li>'+e2(plainMath(o))+'</li>').join('')+'</ol>'):'<div class="blank">Answer: ___________________________</div>';
    qh+='<div class="q"><div class="qt"><b>'+(i+1)+'.</b> '+e2(plainMath(it.question))+'</div>'+fig+opts+'</div>';
    const corr=it.type==='multiple_choice'?(L[it.answerIndex]+'. '+e2(plainMath((it.options&&it.options[it.answerIndex])||it.answer))):e2(plainMath(it.answer));
    ak+='<div class="ak"><b>'+(i+1)+'.</b> '+corr+(it.explanation?(' — '+e2(plainMath(it.explanation))):'')+'</div>';
  });
  const css='body{font:15px/1.55 -apple-system,system-ui,sans-serif;color:#111;max-width:720px;margin:24px auto;padding:0 18px}h1{font-size:20px}h2{margin-top:26px;border-top:1px solid #ccc;padding-top:12px;page-break-before:always}.q{margin:0 0 15px;page-break-inside:avoid}.opts{margin:5px 0 0}.opts li{margin:2px 0}.fig{margin:6px 0}.fig svg,.fig img{max-width:360px;height:auto}.blank{margin-top:8px;color:#555}.ak{margin:3px 0;font-size:13px}';
  w.document.write('<!doctype html><html><head><meta charset="utf-8"><title>'+e2(title||'Worksheet')+'</title><style>'+css+'</style></head><body><h1>'+e2(title||'Practice worksheet')+'</h1>'+qh+'<h2>Answer key</h2>'+ak+'<scr'+'ipt>setTimeout(function(){window.print();},350);</scr'+'ipt></body></html>');
  w.document.close();
}

/* ============================================================ Knowledge map + concept cards (AI-generated, cached, synced) ============================================================
   The "Learn" layer: a curriculum-aligned knowledge-point tree per exam+subject+level,
   grouped by strand and coloured by the student's mastery, where each point opens a
   concept card (key idea + formulas + worked example + common mistakes) and a focused
   drill. Content is generated ONCE by the AI, cached in the shared `curriculum` store,
   and synced. Mastery is computed live per student from their attempts. */
function curriculumKey(s){return [s.country,s.subject,s.exam,s.level].map(x=>String(x==null?'':x).toLowerCase().trim()).join('|');}
async function strandStats(subject){
  const stat={};
  (await dbAll('attempts')).filter(a=>a.profileId===pid()&&a.subject===subject).forEach(a=>(a.results||[]).forEach(r=>{const t=r.topic||'General';(stat[t]=stat[t]||{n:0,c:0}).n++;if(r.status==='correct')stat[t].c++;}));
  return stat;
}
// Build + cache the knowledge-point tree for a setup (one AI call). Points are grouped
// under the exam's known strands so mastery (tracked by topic) lines up.
async function generateKnowledgeTree(s){
  const groups=examTopics(s.exam,s.subject),exam=EXAMS[s.exam]||EXAMS.general;
  const gline=groups.length?('Group EVERY point under EXACTLY one of these strands — copy the strand text verbatim into "group": '+groups.join(' | ')+'.'):'Choose sensible strand names yourself and put each point’s strand in "group".';
  const prompt=`You are a curriculum expert for ${s.country} ${exam.label} ${s.subject} at ${s.level}.
List the key KNOWLEDGE POINTS a student must master for this exam/level. A knowledge point is ONE specific, learnable skill or concept (a "can-do"), e.g. "Add fractions with unlike denominators" — NOT a broad topic.
${gline}
Give 3 to 7 points per strand, ordered foundational → advanced. When a point builds directly on an earlier one, put the earlier point ids in "prereq".
Return ONLY JSON (no prose/fences): {"points":[{"id":"kebab-case-id","name":"short can-do, ≤ 8 words","group":"strand","prereq":["id"]}]}`;
  const raw=await callAI(prompt,8192,0.3);usageBump(1);
  let obj;try{let t=String(raw||'').trim().replace(/^```(?:json)?/i,'').replace(/```\s*$/,'').trim();const m=t.match(/\{[\s\S]*\}/);obj=JSON.parse(m?m[0]:t);}catch(e){throw new Error('Could not read the knowledge map the AI returned.');}
  const raw_pts=(obj&&Array.isArray(obj.points))?obj.points:[];
  const seen=new Set(),points=[];
  raw_pts.forEach(p=>{if(!p||!p.name)return;let id=String(p.id||p.name).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'').slice(0,48)||('p'+points.length);while(seen.has(id))id+='x';seen.add(id);
    points.push({id,name:String(p.name).slice(0,80),group:String(p.group||groups[0]||'General'),prereq:Array.isArray(p.prereq)?p.prereq.map(String):[],card:null});});
  if(!points.length)throw new Error('The AI returned no knowledge points.');
  const rec={id:curriculumKey(s),key:curriculumKey(s),country:s.country,subject:s.subject,exam:s.exam,examLabel:exam.label,level:s.level,points,updatedAt:Date.now()};
  await dbPut('curriculum',rec);scheduleDriveSync();return rec;
}
// Generate + cache a concept card for one knowledge point (one AI call, lazily on open).
async function ensureConceptCard(rec,point,s){
  if(point.card)return point.card;
  const exam=EXAMS[s.exam]||EXAMS.general;
  const prompt=`Write a short LEARN card for the knowledge point "${point.name}" (${point.group}) for a ${s.level} ${s.subject} student (${exam.label}).
Return ONLY JSON (no prose/fences): {"keyIdea":"1-2 very simple sentences","formulas":["$LaTeX$ formula"],"example":{"q":"a short worked EXAMPLE question","steps":["step 1","step 2"]},"mistakes":["a common mistake"]}
Keep it simple and age-appropriate. Use $...$ for maths and \\frac{a}{b} for fractions; use × and ÷ symbols; real line breaks. "formulas" may be [] if none. Under ~90 words total. No quotes/JSON wrapping around the whole thing beyond the object itself.`;
  const raw=await callAI(prompt,1500,0.3);usageBump(1);
  let c;try{let t=String(raw||'').trim().replace(/^```(?:json)?/i,'').replace(/```\s*$/,'').trim();const m=t.match(/\{[\s\S]*\}/);c=JSON.parse(m?m[0]:t);}catch(e){throw new Error('Could not read the concept card the AI returned.');}
  const card={keyIdea:String(c.keyIdea||''),formulas:Array.isArray(c.formulas)?c.formulas.map(String):[],
    example:(c.example&&typeof c.example==='object')?{q:String(c.example.q||''),steps:Array.isArray(c.example.steps)?c.example.steps.map(String):[]}:null,
    mistakes:Array.isArray(c.mistakes)?c.mistakes.map(String):[]};
  point.card=card;point.cardAt=Date.now();rec.updatedAt=Date.now();await dbPut('curriculum',rec);scheduleDriveSync();return card;
}

  const cards=gnames.map(g=>{

        el('div',{class:'row',style:'flex:none;gap:6px'},
          el('button',{class:'btn sm',onclick:()=>viewConcept(rec.key,p.id)},'📖 Learn'),

    });
