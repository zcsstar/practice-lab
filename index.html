// Best-effort tags from a filename, e.g. "ICAS Maths Paper C 2019.pdf".
function autoTagFromName(name){
  const n=String(name||'').toLowerCase().replace(/[_]+/g,' '); // underscores are word chars → break \b matching
  const subject=/\bmath|maths|mathematics\b/.test(n)?'Mathematics':/\bscience\b/.test(n)?'Science':/\benglish|reading|comprehension\b/.test(n)?'English':/\bwriting\b/.test(n)?'Writing':/\bspell/.test(n)?'Spelling':'Mathematics';
  const exam=/\bicas\b/.test(n)?'icas':/\bncea\b/.test(n)?'ncea':/\bapsmo|olympiad|competition\b/.test(n)?'general':'icas';
  const ym=n.match(/\b(20\d{2}|19\d{2})\b/);const year=ym?ym[1]:'';
  let level='';const gm=n.match(/(?:year|grade|yr|gr)\s*([1-9]\d?)/i),pm=n.match(/paper\s*([a-f])/i);
  if(gm&&pm)level='Year '+gm[1]+' (Paper '+pm[1].toUpperCase()+')';
  else if(gm)level='Year '+gm[1];else if(pm)level='Paper '+pm[1].toUpperCase();
  return {country:'New Zealand',exam,subject,level,year};
}
// Pick the reference paper that best matches a practice setup (subject required;
// then prefer same exam, overlapping level, newest year). Returns null if none.
function bestRef(s,refs){
  const sub=String(s.subject||'').toLowerCase();
  // Require the binary to be on THIS device (dataB64) — metadata-only refs synced
  // from another device can't be used for grounding here.
  const cand=(refs||[]).filter(r=>r&&r.tags&&r.dataB64&&String(r.tags.subject||'').toLowerCase()===sub);
  if(!cand.length)return null;
  const stoks=String(s.level||'').toLowerCase().match(/[a-z]+|\d+/g)||[];
  const score=r=>{const t=r.tags||{};let sc=0;
    if((t.exam||'')===(s.exam||''))sc+=4;
    const lt=String(t.level||'').toLowerCase();
    if(lt&&stoks.some(tok=>tok.length>=1&&lt.includes(tok)))sc+=2;
    sc+=(parseInt(String(t.year||'').replace(/\D/g,''),10)||0)/100000; // recency tiebreak
    return sc;};
  return cand.map(r=>({r,sc:score(r)})).sort((a,b)=>b.sc-a.sc)[0].r;
}

// the trainer carries `candyEarned`/`candySpent` (candy = earned − spent). Every device
// only ever increments these, so MAX-merge keeps the true total and spends STICK

// Pure MAX-merge of the ledger fields — reused by mergeRemote and unit-tested.
function mergeCardRec(cur,rem){const g=Math.max(cur.gained||0,rem.gained||0),l=Math.max(cur.lost||0,rem.lost||0);return {gained:g,lost:l,count:Math.max(0,g-l),level:Math.max(cur.level||1,rem.level||1),shiny:!!(cur.shiny||rem.shiny)};}
function mergeTrainerVals(cur,rem){const earned=Math.max(cur.candyEarned||0,rem.candyEarned||0),spent=Math.max(cur.candySpent||0,rem.candySpent||0);return {xp:Math.max(cur.xp||0,rem.xp||0),candyEarned:earned,candySpent:spent,candy:Math.max(0,earned-spent)};}
async function cardAward(card){
  const id=pid()+':'+card.dexId,all=await dbAll('cards');
  let rec=all.find(c=>c.id===id);if(rec)normCard(rec);
  const dupe=!!rec&&rec.count>=1; // already OWN one (a count-0 pile that was traded away isn't a dupe — it's a fresh re-catch)
  if(rec){rec.gained=(rec.gained||0)+1;if(card.shiny)rec.shiny=true;}
  else rec={id,profileId:pid(),dexId:card.dexId,tier:card.tier,gained:1,lost:0,count:1,level:1,shiny:!!card.shiny,firstAt:Date.now()};
  normCard(rec);await dbPut('cards',rec);return {rec,dupe};
}
// Owned = at least one copy (count-0 piles are kept for the ledger but hidden).
async function cardsForProfile(){return (await dbAll('cards')).map(normCard).filter(c=>c.profileId===pid()&&(c.count||0)>=1);}

/* ----- Trainer: XP + level (infinite progression) + candy economy ----- */
// XP curve: L1→2 needs 100, then +50 each level. Returns level + progress into it.
function trainerLevel(xp){let lvl=1,need=100,acc=0;xp=Math.max(0,xp||0);while(xp>=acc+need){acc+=need;lvl++;need+=50;}return {level:lvl,into:xp-acc,need};}
const CARD_MAX_LEVEL=20;
// Candy to raise a card from `level` to level+1. Grows QUADRATICALLY so early
// levels stay cheap/rewarding but higher levels are a real goal (L1≈13, L5≈53,
// L10≈148, L19≈445) — a meaningful long-term candy sink.
function trainCost(level){level=level||1;return 8+level*4+level*level;}
async function trainerGet(){return normTrainer((await dbAll('trainer')).find(t=>t.id===pid())||{id:pid(),xp:0,candy:0,candyEarned:0,candySpent:0});}
async function trainerAdd(xp,candy){const t=await trainerGet();t.xp=(t.xp||0)+(xp||0);t.candyEarned=(t.candyEarned||0)+(candy||0);normTrainer(t);t.updatedAt=Date.now();await dbPut('trainer',t);return t;}
async function trainerSpend(candy){const t=await trainerGet();if((t.candy||0)<candy)return false;t.candySpent=(t.candySpent||0)+candy;normTrainer(t);t.updatedAt=Date.now();await dbPut('trainer',t);return true;}
// Train (power up) a card a level. Returns true on success; caller refreshes its view.
async function trainCard(dexId){
  const rec=(await cardsForProfile()).find(c=>c.dexId===dexId);if(!rec)return false;
  if((rec.level||1)>=CARD_MAX_LEVEL){toast('Already max level!');return false;}
  const cost=trainCost(rec.level||1),t=await trainerGet();
  if((t.candy||0)<cost){toast('Need '+cost+' 🍬 to train — you have '+(t.candy||0)+'. Do more practice to earn candy!');return false;}
  await trainerSpend(cost);rec.level=(rec.level||1)+1;await dbPut('cards',rec);scheduleDriveSync();
  toast('Trained! '+(POKE_BY_ID[dexId]?POKE_BY_ID[dexId].name:'')+' → Lv '+rec.level);return true;
}
// Spend candy to make a card shiny (cosmetic) — a flexible candy sink. Cost
// scales with rarity so a shiny legendary is a real achievement (t1=90 … t5=210).
function shinyCost(tier){return 60+(tier||1)*30;}
async function makeCardShiny(dexId){
  const rec=(await cardsForProfile()).find(c=>c.dexId===dexId);if(!rec||rec.shiny)return false;
  const cost=shinyCost(rec.tier),t=await trainerGet();if((t.candy||0)<cost){toast('Need '+cost+' 🍬 to make this shiny — you have '+(t.candy||0)+'.');return false;}
  await trainerSpend(cost);rec.shiny=true;await dbPut('cards',rec);scheduleDriveSync();toast('✨ '+(POKE_BY_ID[dexId]?POKE_BY_ID[dexId].name:'It')+' is now shiny!');return true;
}
// Battle-ready stats + moves, derived from tier + level (no extra storage; reused by battles).
function cardStats(tier,level){level=level||1;return {hp:20+tier*8+(level-1)*5,atk:6+tier*3+(level-1)*2,def:4+tier*2+Math.round((level-1)*1.5),spd:8+tier*2+(level-1)};}
// Each Pokémon gets a 3-move kit with real trade-offs:
//  1) STAB attack of its OWN type (reliable, gets the same-type ×1.5 bonus in battle),
//  2) Take Down — a risky big hit (Normal coverage, high power, only 75% accuracy, high crit),
//  3) a utility/status move (buff self, debuff foe, or heal) — chosen deterministically per dex id.
function cardMoves(dexId,tier,level){
  level=level||1;const types=pokeTypes(dexId);
  const pwr=base=>base+tier*2+(level-1)*2;
  const tm=TYPE_MOVE[types[0]]||TYPE_MOVE.normal;
  const stab={name:tm.name,type:types[0],power:pwr(tm.power),acc:tm.acc,crit:tm.crit||0.08,kind:'attack',status:tm.status,statusChance:tm.statusChance};
  const risky={name:'Take Down',type:'normal',power:pwr(tm.power)+6,acc:75,crit:0.18,kind:'attack'};
  const util=Object.assign({type:'status'},UTIL_MOVES[dexId%UTIL_MOVES.length]);
  return [stab,risky,util];
}

/* ----- Trading Post (async stall) -----
   Post one of your Pokémon and what you want for it; anyone in the family can
   take the deal later (no need to be online together). Transfers happen locally
   on whatever device does them (perfect on a shared device / profile switching);
   offers + results sync best-effort. Want types kept kid-simple: candy or a
   specific Pokémon. */
// Cross-profile card give/take (by profileId, not just the active one).
async function cardGiveTo(profileId,snap){
  const id=profileId+':'+snap.dexId;let rec=(await dbAll('cards')).find(c=>c.id===id);if(rec)normCard(rec);
  if(rec){rec.gained=(rec.gained||0)+1;rec.level=Math.max(rec.level||1,snap.level||1);if(snap.shiny)rec.shiny=true;normCard(rec);await dbPut('cards',rec);}
  else await dbPut('cards',{id,profileId,dexId:snap.dexId,tier:snap.tier,gained:1,lost:0,count:1,level:snap.level||1,shiny:!!snap.shiny,firstAt:Date.now()});
}
async function cardTakeFrom(profileId,dexId){
  const id=profileId+':'+dexId;let rec=(await dbAll('cards')).find(c=>c.id===id);if(rec)normCard(rec);
  if(!rec||(rec.count||0)<1)return null;
  const snap={dexId,tier:rec.tier,level:rec.level||1,shiny:!!rec.shiny};
  rec.lost=(rec.lost||0)+1;normCard(rec);await dbPut('cards',rec); // keep the (now count-0) record so the ledger merge doesn't resurrect it
  return snap;
}
async function trainerGetFor(profileId){return normTrainer((await dbAll('trainer')).find(t=>t.id===profileId)||{id:profileId,xp:0,candy:0,candyEarned:0,candySpent:0});}
async function trainerCandyMove(profileId,delta){const t=await trainerGetFor(profileId);if(delta>=0)t.candyEarned=(t.candyEarned||0)+delta;else t.candySpent=(t.candySpent||0)+(-delta);normTrainer(t);t.updatedAt=Date.now();await dbPut('trainer',t);}
function profileName(id){const p=CFG.profiles.find(x=>x.id===id);return p?p.name:'A player';}
function wantLabel(w){return w.type==='candy'?('🍬 '+w.amount+' candy'):(POKE_BY_ID[w.dexId]?POKE_BY_ID[w.dexId].name:'a Pokémon');}
async function tradesOpen(){return (await dbAll('trades')).filter(t=>t.status==='open');}
// Does the ACTIVE profile meet an offer's requirement?
async function canFulfill(w){
  if(w.type==='candy')return (await trainerGetFor(pid())).candy>=w.amount;
  if(w.type==='card')return !!(await cardsForProfile()).find(c=>c.dexId===w.dexId&&(c.count||1)>=1);
  return false;
}
async function postTrade(dexId,want){
  const snap=await cardTakeFrom(pid(),dexId);if(!snap)return toast('You don’t have that card to offer.');
  await dbPut('trades',{id:uid(),sellerId:pid(),sellerName:activeProfile().name,card:snap,want,status:'open',createdAt:Date.now()});
  scheduleDriveSync();toast('Offer posted! Someone can take it anytime. 🎉');
}
async function cancelTrade(id){
  const t=(await dbAll('trades')).find(x=>x.id===id);if(!t||t.status!=='open'||t.sellerId!==pid())return;
  await cardGiveTo(pid(),t.card);t.status='cancelled';t.resolvedAt=Date.now();await dbPut('trades',t);scheduleDriveSync();toast('Offer cancelled — card returned.');
}
async function acceptTrade(id){
  const t=(await dbAll('trades')).find(x=>x.id===id);
  if(!t||t.status!=='open')return toast('That deal is no longer available.');
  if(t.sellerId===pid())return toast('That’s your own offer!');
  if(!await canFulfill(t.want))return toast('You don’t have what this trade needs yet.');
  // pay the requirement from buyer → seller
  if(t.want.type==='candy'){await trainerCandyMove(pid(),-t.want.amount);await trainerCandyMove(t.sellerId,t.want.amount);}
  else if(t.want.type==='card'){const paid=await cardTakeFrom(pid(),t.want.dexId);if(!paid)return toast('You don’t have that Pokémon anymore.');await cardGiveTo(t.sellerId,paid);}
  // give the offered card to the buyer
  await cardGiveTo(pid(),t.card);
  t.status='done';t.takenBy=pid();t.takenByName=activeProfile().name;t.resolvedAt=Date.now();await dbPut('trades',t);
  scheduleDriveSync();toast('Trade complete! You got '+(POKE_BY_ID[t.card.dexId]?POKE_BY_ID[t.card.dexId].name:'a Pokémon')+'. 🎉');
}

/* ----- MISTAKES NOTEBOOK ----- */
// Start a re-test session from a list of review items (oldest/least-mastered first, capped).
// Collapse duplicate mistakes-notebook entries for the SAME question (profile+qhash)
// into one — keeps the freshest un-mastered record, sums timesSeen, drops the rest.
// Idempotent; heals legacy data and cross-device sync duplicates.
async function mergeReviewDuplicates(profileId){
  const pfid=profileId||pid();
  const byKey={};for(const r of (await dbAll('review')).filter(r=>r.profileId===pfid)){const k=qhash(String(r.question||''));(byKey[k]=byKey[k]||[]).push(r);}
  let removed=0;
  for(const k in byKey){const g=byKey[k];if(g.length<2)continue;
    g.sort((a,b)=>((a.mastered?1:0)-(b.mastered?1:0))||((b.createdAt||0)-(a.createdAt||0))); // un-mastered + newest first
    const keep=g[0];keep.timesSeen=g.reduce((s,x)=>s+(x.timesSeen||0),0);
    for(const x of g.slice(1)){await dbDel('review',x.id);removed++;}
    await dbPut('review',keep);
  }
  if(removed)scheduleDriveSync();
  return removed;
}
// Manually add a question to the mistakes notebook — e.g. a PAST question the student
// got RIGHT but wants to understand better (Howard's ask). De-dupes by qhash; files a
// neutral 'learn' item by default so it enters spaced revision WITHOUT being mislabelled
// a mistake. Clears any "removed" block so an explicitly-added question actually shows.
async function addToNotebook(q,ctx,reason){
  reason=reason||'learn';ctx=ctx||{};
  const h=qhash(String(q.question||''));if(!h)return 'skip';
  if(CFG.blocked&&CFG.blocked[blockId(h)]){delete CFG.blocked[blockId(h)];saveCfg();}
  const existing=(await dbAll('review')).find(r=>r.profileId===pid()&&qhash(String(r.question||''))===h);
  if(existing){
    existing.timesSeen=(existing.timesSeen||0)+1;
    if(existing.mastered){existing.mastered=false;existing.timesCorrect=0;}
    existing.dueAt=Date.now();
    await dbPut('review',existing);scheduleDriveSync();return 'updated';
  }
  await dbPut('review',{id:uid(),profileId:pid(),createdAt:Date.now(),date:todayISO(),dueAt:Date.now(),
    exam:ctx.exam||q.exam,subject:ctx.subject||q.subject,level:ctx.level||q.level,topic:q.topic||'General',reason,
    timesSeen:1,timesCorrect:0,mastered:false,question:q.question,svg:q.svg,image:q.image,type:q.type,options:q.options,
    answerIndex:q.answerIndex,answer:q.answer,acceptedAnswers:q.acceptedAnswers,explanation:q.explanation,marks:q.marks||1,hint:q.hint,whyWrong:q.whyWrong});
  scheduleDriveSync();return 'added';
}

let driveToken=null,tokenClient=null,syncTimer=null;
function driveReady(){return CFG.drive.enabled&&driveClientId()&&window.google&&google.accounts&&google.accounts.oauth2;}
function driveConnect(interactive){if(!driveClientId())return toast('No OAuth Client ID configured.');if(!window.google||!google.accounts||!google.accounts.oauth2)return toast('Google library not loaded (need internet + https).');if(!tokenClient)tokenClient=google.accounts.oauth2.initTokenClient({client_id:driveClientId(),scope:'https://www.googleapis.com/auth/drive.appdata',callback:r=>{if(r.access_token){driveToken=r.access_token;toast('☁️ Connected to Drive');driveSyncNow();}}});tokenClient.requestAccessToken({prompt:interactive?'consent':''});}
function scheduleDriveSync(){if(!driveReady())return;clearTimeout(syncTimer);syncTimer=setTimeout(()=>{if(driveToken)driveSyncNow();else driveConnect(false);},1500);}
async function driveFindFile(){const r=await fetch("https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name%3D'practice-lab.json'&fields=files(id,name)",{headers:{Authorization:'Bearer '+driveToken}});if(!r.ok)throw new Error('drive list '+r.status);return (await r.json()).files?.[0]?.id||null;}
async function driveSyncNow(){if(!driveToken)return;try{const fileId=await driveFindFile();if(fileId){const rr=await fetch('https://www.googleapis.com/drive/v3/files/'+fileId+'?alt=media',{headers:{Authorization:'Bearer '+driveToken}});if(rr.ok)await mergeRemote(await rr.json());}// Sync ref papers WITHOUT their base64 binary (the big space hog) — only the
// extracted text + tags travel; the PDF/image stays on the device that imported
// it (where grounding/pre-generation happens). Keeps the sync blob light.
const refsLite=(await dbAll('refs')).map(({dataB64,...r})=>r);
const merged={attempts:await dbAll('attempts'),review:await dbAll('review'),refs:refsLite,bank:await dbAll('bank'),cards:await dbAll('cards'),trainer:await dbAll('trainer'),trades:await dbAll('trades'),packs:await dbAll('packs'),curriculum:await dbAll('curriculum'),packsDeleted:CFG.packsDeleted||{},refsDeleted:CFG.refsDeleted||{},cleared:CFG.cleared||{},blocked:CFG.blocked||{},profiles:CFG.profiles,settings:pickSyncSettings(),settingsAt:CFG.settingsAt||0,savedAt:new Date().toISOString()};const meta={name:'practice-lab.json',mimeType:'application/json'};if(!fileId)meta.parents=['appDataFolder'];const b='pl'+Math.random().toString(36).slice(2);const body=`--${b}\r\nContent-Type: application/json; charset=UTF-8\r\n\r\n${JSON.stringify(meta)}\r\n--${b}\r\nContent-Type: application/json\r\n\r\n${JSON.stringify(merged)}\r\n--${b}--`;const wr=await fetch('https://www.googleapis.com/upload/drive/v3/files'+(fileId?'/'+fileId:'')+'?uploadType=multipart',{method:fileId?'PATCH':'POST',headers:{Authorization:'Bearer '+driveToken,'Content-Type':'multipart/related; boundary='+b},body});if(!wr.ok)throw new Error('drive save '+wr.status);}catch(e){console.warn('drive sync',e);}}
async function mergeRemote(remote){
  // Shared settings: newest explicit edit wins (e.g. parent turns on email summaries).
  if(remote.settings&&(remote.settingsAt||0)>(CFG.settingsAt||0)){applySyncSettings(remote.settings);CFG.settingsAt=remote.settingsAt;saveCfg();try{initEmailJS();}catch(e){}}
  if(Array.isArray(remote.profiles))for(const rp of remote.profiles){
    const lp=CFG.profiles.find(x=>x.id===rp.id||x.name.toLowerCase()===String(rp.name).toLowerCase());
    if(!lp){CFG.profiles.push(rp);}
    else if(rp.defaults&&(rp.defaultsAt||0)>(lp.defaultsAt||0)){lp.defaults=rp.defaults;lp.defaultsAt=rp.defaultsAt;} // newer defaults win
  }
  saveCfg();
  // Clear-bank / Clear-history stamps {"store:profileId":clearedAt}: union remote (max wins),
  // then drop any local item created at/before its stamp — so a wholesale Clear sticks and
  // propagates across devices, while items generated AFTER the clear survive.
  if(remote.cleared){CFG.cleared=CFG.cleared||{};for(const k in remote.cleared){const t=remote.cleared[k];if(t>(CFG.cleared[k]||0))CFG.cleared[k]=t;}saveCfg();}
  // "Remove this question" block-list {"profileId|qhash":ts}: union remote (max wins),
  // then drop any local bank/review copy now blocked — so a remove sticks everywhere.
  if(remote.blocked){CFG.blocked=CFG.blocked||{};for(const k in remote.blocked){const t=remote.blocked[k];if(t>(CFG.blocked[k]||0))CFG.blocked[k]=t;}saveCfg();
    for(const b of(await dbAll('bank')))if(isBlockedHash(b.qhash,b.profileId))await dbDel('bank',b.id);
    for(const r of(await dbAll('review')))if(isBlockedHash(qhash(String(r.question||'')),r.profileId))await dbDel('review',r.id);}
  const clr=CFG.cleared||{};
  const isCleared=(store,it,tsField)=>{const t=clr[store+':'+it.profileId]||0;return t>0&&((it[tsField]||0)<=t);};
  for(const a of(await dbAll('attempts')))if(isCleared('attempts',a,'startedAt'))await dbDel('attempts',a.id);
  for(const r of(await dbAll('review')))if(isCleared('review',r,'createdAt'))await dbDel('review',r.id);
  for(const b of(await dbAll('bank')))if(isCleared('bank',b,'createdAt'))await dbDel('bank',b.id);
  const la=new Map((await dbAll('attempts')).map(a=>[a.id,a]));for(const a of(remote.attempts||[])){if(isCleared('attempts',a,'startedAt'))continue;if(!la.has(a.id))await dbPut('attempts',a);}
  const lr=new Map((await dbAll('review')).map(r=>[r.id,r]));for(const r of(remote.review||[])){if(isCleared('review',r,'createdAt'))continue;if(isBlockedHash(qhash(String(r.question||'')),r.profileId))continue;if(!lr.has(r.id))await dbPut('review',r);}
  // Reference papers: tombstone deletions (ref ids are unique per import, so a deleted id never recurs).
  if(remote.refsDeleted){CFG.refsDeleted=CFG.refsDeleted||{};for(const id in remote.refsDeleted){const t=remote.refsDeleted[id];if(t>(CFG.refsDeleted[id]||0))CFG.refsDeleted[id]=t;}saveCfg();}
  const rdel=CFG.refsDeleted||{};
  for(const r of(await dbAll('refs')))if(rdel[r.id])await dbDel('refs',r.id);
  const lf=new Map((await dbAll('refs')).map(r=>[r.id,r]));for(const r of(remote.refs||[])){if(rdel[r.id])continue;if(!lf.has(r.id))await dbPut('refs',r);}
  const lb=new Map((await dbAll('bank')).map(b=>[b.id,b]));for(const b of(remote.bank||[])){if(isCleared('bank',b,'createdAt'))continue;if(isBlockedHash(b.qhash,b.profileId))continue;if(!lb.has(b.id))await dbPut('bank',b);}
  // Cards: MAX-merge the monotonic gained/lost ledger (count = gained − lost) + level (max) +
  // shiny (or). Because gained/lost only ever grow, a SPEND (lost++) survives the merge — a
  // traded-away/converted card stays gone instead of resurrecting. Count-0 piles are kept.
  const lc=new Map((await dbAll('cards')).map(c=>[c.id,normCard(c)]));
  for(const c of(remote.cards||[])){normCard(c);const cur=lc.get(c.id);if(!cur){await dbPut('cards',c);continue;}const m=mergeCardRec(cur,c);if(m.gained!==cur.gained||m.lost!==cur.lost||m.level!==cur.level||m.shiny!==cur.shiny){Object.assign(cur,m);await dbPut('cards',cur);}}
  // Trainer: MAX-merge XP and the candyEarned/candySpent ledger (candy = earned − spent), so a
  // candy SPEND (trained card / shiny / trade) sticks cross-device instead of being restored.
  const lt=new Map((await dbAll('trainer')).map(t=>[t.id,normTrainer(t)]));
  for(const t of(remote.trainer||[])){normTrainer(t);const cur=lt.get(t.id);if(!cur){await dbPut('trainer',t);continue;}const m=mergeTrainerVals(cur,t);if(m.xp!==cur.xp||m.candyEarned!==cur.candyEarned||m.candySpent!==cur.candySpent){Object.assign(cur,m);await dbPut('trainer',cur);}}
  // Trades: a resolved (done/cancelled) status always wins over open, so a taken offer can't reopen.
  const rank=s=>s==='open'?0:1;
  const lq=new Map((await dbAll('trades')).map(t=>[t.id,t]));for(const t of(remote.trades||[])){const cur=lq.get(t.id);if(!cur)await dbPut('trades',t);else if(rank(t.status)>rank(cur.status)||(t.resolvedAt||0)>(cur.resolvedAt||0))await dbPut('trades',t);}
  // Pack deletions propagate via tombstones {id:deletedAt} — union remote into local first.
  if(remote.packsDeleted){CFG.packsDeleted=CFG.packsDeleted||{};for(const id in remote.packsDeleted){const t=remote.packsDeleted[id];if(t>(CFG.packsDeleted[id]||0))CFG.packsDeleted[id]=t;}saveCfg();}
  const tomb=CFG.packsDeleted||{};
  // Drop any local pack whose deletion is newer than the pack itself (so a delete sticks).
  for(const p of(await dbAll('packs'))){const td=tomb[p.id];if(td&&td>=(p.updatedAt||0))await dbDel('packs',p.id);}
  // Past-paper packs (shared, real questions): merge by id; a newer updatedAt wins — but skip
  // anything tombstoned unless the remote copy is a NEWER re-import (updatedAt beats the delete).
  const lpk=new Map((await dbAll('packs')).map(p=>[p.id,p]));for(const p of(remote.packs||[])){const td=tomb[p.id];if(td&&td>=(p.updatedAt||0))continue;const cur=lpk.get(p.id);if(!cur||(p.updatedAt||0)>(cur.updatedAt||0))await dbPut('packs',p);}
  // Knowledge-map curriculum (shared, AI-generated): merge by id, newer updatedAt wins (keeps the copy with more concept cards filled in).
  const lcm=new Map((await dbAll('curriculum')).map(c=>[c.id,c]));for(const c of(remote.curriculum||[])){const cur=lcm.get(c.id);if(!cur||(c.updatedAt||0)>(cur.updatedAt||0))await dbPut('curriculum',c);}
  try{for(const p of CFG.profiles)await mergeReviewDuplicates(p.id);}catch(e){} // merging remote review items can reintroduce same-question dupes across devices
  await reconcileProfiles();
}

function stableId(name){return 'u:'+String(name).toLowerCase().trim();}
// Students = the non-parent login users. Seed/migrate to stable ids; drop stray
// profiles (parent-named or legacy) that have no saved practices. Idempotent.
async function reconcileProfiles(){
  if(!gateActive())return;
  const names=studentNames();if(!names.length)return;
  let attempts=[],review=[],refs=[];
  try{attempts=await dbAll('attempts');review=await dbAll('review');refs=await dbAll('refs');}catch(e){}
  for(const nm of names){
    const sid=stableId(nm);
    const existing=CFG.profiles.find(p=>p.id===sid||p.name.toLowerCase()===nm.toLowerCase());
    if(existing&&existing.id!==sid){ // migrate data references from old id → stable id
      const oldId=existing.id;
      for(const a of attempts)if(a.profileId===oldId){a.profileId=sid;await dbPut('attempts',a);}
      for(const r of review)if(r.profileId===oldId){r.profileId=sid;await dbPut('review',r);}
      for(const f of refs)if(f.profileId===oldId){f.profileId=sid;await dbPut('refs',f);}
      existing.id=sid;
    } else if(!existing){CFG.profiles.push({id:sid,name:nm});}
  }
  const seen=new Set();CFG.profiles=CFG.profiles.filter(p=>{if(seen.has(p.id))return false;seen.add(p.id);return true;});
  const hasData=id=>attempts.some(a=>a.profileId===id);
  const isStudent=p=>names.some(n=>stableId(n)===p.id);
  CFG.profiles=CFG.profiles.filter(p=>isStudent(p)||hasData(p.id));
  // pre-fill suggested defaults for known students that don't have any yet
  for(const p of CFG.profiles){const sd=SEED_DEFAULTS[p.name.toLowerCase()];if(sd&&!p.defaults){p.defaults={...sd};p.defaultsAt=1;}}
  const au=authedUser(); // a student is locked to their own profile
  if(au&&!au.parent)CFG.activeProfileId=stableId(au.name);
  if(!CFG.profiles.find(p=>p.id===CFG.activeProfileId))CFG.activeProfileId=(CFG.profiles[0]||{}).id;
  saveCfg();
}
function applyAuthedProfile(name){
  if(isParentName(name)){ // parent isn't a student — land on a student profile
    const students=CFG.profiles.filter(p=>!isParentName(p.name));
    if(students.length&&!students.find(p=>p.id===CFG.activeProfileId))CFG.activeProfileId=students[0].id;
    saveCfg();return;
  }
  const sid=gateActive()?stableId(name):null;
  const p=CFG.profiles.find(x=>(sid&&x.id===sid)||x.name.toLowerCase()===String(name).toLowerCase());
  if(p){if(sid)p.id=sid;CFG.activeProfileId=p.id;}else{const np={id:sid||uid(),name};CFG.profiles.push(np);CFG.activeProfileId=np.id;}
  saveCfg();
}
function viewLogin(){
  $('header.app').style.display='none';
  const pwd=el('input',{type:'password',placeholder:'Password',autocomplete:'current-password',onkeydown:e=>{if(e.key==='Enter')tryLogin();}});
  const errEl=el('div',{class:'small',style:'color:var(--bad);min-height:18px;margin-top:6px'});
  async function tryLogin(){const h=await plHash(pwd.value);const u=AUTH.users.find(x=>x.hash&&x.hash===h);if(!u){errEl.textContent='Incorrect password. Try again.';pwd.value='';pwd.focus();return;}localStorage.setItem(AUTH_KEY,JSON.stringify({name:u.name,parent:!!u.parent,ts:Date.now()}));applyAuthedProfile(u.name);await unlockSharedKey(u.name,pwd.value);toast('Welcome, '+u.name+'!');await startApp();}
  show(el('div',{style:'max-width:380px;margin:8vh auto 0'},
    el('div',{class:'card',style:'text-align:center'},
      el('div',{class:'logo',style:'margin:0 auto 14px'},'🧪'),
      el('h2',{style:'font-size:22px'},'Practice Lab'),
      el('p',{class:'sub'},'Enter your password to continue.'),
      pwd,errEl,
      el('button',{class:'btn primary block lg',style:'margin-top:12px',onclick:tryLogin},'Sign in')
    )));
  setTimeout(()=>pwd.focus(),60);
}
async function startApp(){
  $('header.app').style.display='';
  applyVaultMeta();
  await reconcileProfiles();
  await seedLocalPacks();
  initEmailJS();refreshHeaderProfile();
  if(CFG.drive.enabled&&driveClientId()&&location.protocol==='https:'){const t=()=>{if(window.google&&google.accounts&&google.accounts.oauth2)driveConnect(false);else setTimeout(t,500);};setTimeout(t,800);}
  // First run (never seen the guide + no practices yet): show the "How it works" guide once.
  let firstRun=false;try{firstRun=!localStorage.getItem('practicelab.guideSeen');}catch(e){}
  if(firstRun){try{if(!(await dbAll('attempts')).length){viewGuide();return;}}catch(e){}}
  // Parents land on the family dashboard; students land on their own home.
  if(gateActive()&&isParent())viewDashboard();else viewHome();
}
// Versioning: v1.x — bump the minor (v1.1, v1.2, …) each release; reserve a major
// bump (v2.0) for a big feature release. (Claude suggests the number; Chi decides.)
const APP_VERSION='v2.35';
(async function boot(){
  try{$('#footYear').textContent=new Date().getFullYear();$('#footVer').textContent=APP_VERSION;}catch(e){}
  try{await openDB();}catch(e){console.warn('IndexedDB unavailable',e);}
  if(gateActive()&&!authedUser()){viewLogin();return;}
  await startApp();
})();
</script>
